<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0E7C6B">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Smart Lake — Fermer</title>
<!-- Shriftlar: tizim shriftlari (offline/APK uchun — CDN yo'q) -->
<style>
  :root{
    --bg:#EAF1EF; --surface:#FFFFFF; --surface-2:#F4F8F7;
    --ink:#11302B; --ink-soft:#5E736E; --ink-faint:#92A29E;
    --primary:#0E7C6B; --primary-d:#0A5C50; --aqua:#15AEC2;
    --good:#1E9E6A; --warn:#E0922F; --crit:#DC4B3E;
    --line:#DDE7E4; --line-soft:#EAF0EE;
    --r:16px; --r-sm:12px;
    --shadow:0 6px 22px rgba(16,60,52,.08);
    --sans:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, system-ui, sans-serif;
    --mono:ui-monospace, "SF Mono", "Roboto Mono", "Droid Sans Mono", Menlo, Consolas, monospace;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0; height:100%; overflow:hidden;}
  body{ font-family:var(--sans); background:#0A4A42; color:var(--ink);
    font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased; overscroll-behavior:none;
    -webkit-text-size-adjust:100%; text-size-adjust:100%; -webkit-touch-callout:none;}
  /* .app = ekran "uyasi": balandligi viewport bo'yicha qat'iy, ichida bitta ekran ko'rinadi */
  .app{ max-width:480px; margin:0 auto; height:100vh; height:100dvh; background:var(--bg);
    position:relative; overflow:hidden; }
  .topbar{ position:sticky; top:0; z-index:30; background:var(--primary);
    color:#fff; padding:12px 16px; padding-top:calc(12px + env(safe-area-inset-top,0px));
    display:flex; align-items:center; gap:12px;
    box-shadow:0 2px 14px rgba(10,92,80,.25); min-height:58px; overflow:hidden; }
  .topbar > *{ position:relative; z-index:2; }
  /* har bir ekran yuqorisidagi yashil zonada oqar to'lqin */
  .topbar::before{ content:""; position:absolute; inset:0; z-index:0; pointer-events:none;
    background:url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPScxMjAnIGhlaWdodD0nMjInIHZpZXdCb3g9JzAgMCAxMjAgMjInPjxwYXRoIGQ9J00wIDExIHEzMCAtNiA2MCAwIHQ2MCAwJyBmaWxsPSdub25lJyBzdHJva2U9JyNmZmZmZmYnIHN0cm9rZS13aWR0aD0nMS42Jy8+PC9zdmc+") repeat; background-size:120px 22px; opacity:.16;
    animation:slWave 9s linear infinite; }
  .topbar::after{ content:""; position:absolute; left:0; right:0; bottom:-1px; height:14px; z-index:1; pointer-events:none;
    background:url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPScxMjAnIGhlaWdodD0nMTQnIHZpZXdCb3g9JzAgMCAxMjAgMTQnPjxwYXRoIGQ9J00wIDggcTMwIC02IDYwIDAgdDYwIDAnIGZpbGw9J25vbmUnIHN0cm9rZT0nI2ZmZmZmZicgc3Ryb2tlLXdpZHRoPScyLjQnIHN0cm9rZS1saW5lY2FwPSdyb3VuZCcvPjwvc3ZnPg==") repeat-x; background-size:120px 14px; opacity:.5;
    animation:slWave 6s linear infinite reverse; }
  @keyframes slWave{ to{ background-position-x:-120px; } }
  .topbar .back{ font-size:26px; line-height:1; cursor:pointer; width:24px; }
  .tb-logo{ width:34px; height:34px; object-fit:contain; flex-shrink:0;
    filter:drop-shadow(0 1px 2px rgba(0,0,0,.2)); }
  .topbar h1{ font-size:18px; font-weight:600; margin:0; flex:1; letter-spacing:.2px;}
  .topbar .sub{ font-size:12px; opacity:.85; font-weight:400; }
  .bell{ position:relative; cursor:pointer; font-size:20px;}
  .bell .dot{ position:absolute; top:-3px; right:-4px; background:var(--crit);
    color:#fff; font-size:10px; font-weight:700; min-width:16px; height:16px;
    border-radius:9px; display:flex; align-items:center; justify-content:center; padding:0 4px;}
  .content{ flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:18px 16px 92px; }
  /* HAR BIR EKRAN .app'ni to'liq qoplaydi; faqat .active ko'rinadi (panellar bir-birining
     ustiga "yopishib" qolmasligi uchun) */
  .screen{ position:absolute; inset:0; display:none; }
  .screen.active{ display:flex; flex-direction:column; animation:fade .22s ease; }
  @keyframes fade{ from{opacity:0;} to{opacity:1;}}
  .nav{ position:sticky; bottom:0; z-index:30; background:var(--surface);
    border-top:1px solid var(--line); display:flex;
    padding:8px 6px calc(10px + env(safe-area-inset-bottom,0px)); }
  .nav button{ flex:1; background:none; border:none; font-family:var(--sans);
    color:var(--ink-faint); font-size:11px; font-weight:500; padding:4px;
    display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; }
  .nav button .ic{ font-size:20px; line-height:1;}
  .nav button.on{ color:var(--primary); }
  .card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--r);
    padding:16px; box-shadow:var(--shadow); }
  .lake-card{ margin-bottom:12px; transition:transform .12s;}
  .lake-row{ display:flex; align-items:center; gap:14px; cursor:pointer;}
  .del-bar{ display:flex; gap:8px; margin-top:12px; padding-top:12px; border-top:1px solid var(--line-soft);}
  .del-btn{ flex:2; background:#FBE3E0; color:#A12C22; border:1px solid #F2C9C4; border-radius:10px; padding:11px; font-family:var(--sans); font-weight:600; font-size:14px; cursor:pointer;}
  .del-cancel{ flex:1; background:var(--surface-2); color:var(--ink-soft); border:1px solid var(--line); border-radius:10px; padding:11px; font-family:var(--sans); font-weight:600; font-size:14px; cursor:pointer;}
  .lake-card:active{ transform:scale(.99); }
  .lake-ring{ width:54px; height:54px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--mono); font-weight:700; font-size:15px; color:var(--ink);}
  .lake-card .nm{ flex:1; min-width:0;}
  .lake-card .nm .t{ font-weight:600; font-size:16px; }
  .lake-card .nm .s{ font-size:12px; color:var(--ink-soft); margin-top:2px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .lake-card .arr{ color:var(--ink-faint); font-size:20px; }
  .pill{ display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600;
    padding:3px 9px; border-radius:20px; }
  .pill.good{ background:#E2F3EB; color:#0F6E47;}
  .pill.warn{ background:#FBEFDC; color:#9A5E12;}
  .pill.crit{ background:#FBE3E0; color:#A12C22;}
  .pill.aer-on{ background:#DBF4F8; color:#0B6B79;}
  .pill.aer-off{ background:#EDF2F0; color:#5E736E;}
  .sec-h{ font-size:12px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase;
    color:var(--ink-faint); margin:22px 2px 10px; }
  .sec-h:first-child{ margin-top:4px;}
  .btn{ width:100%; border:none; border-radius:var(--r-sm); padding:15px;
    font-family:var(--sans); font-weight:600; font-size:15px; cursor:pointer;
    background:var(--primary); color:#fff; }
  .btn:active{ background:var(--primary-d);}
  .btn.ghost{ background:var(--surface); color:var(--primary); border:1.5px solid var(--line);}
  .btn.sm{ padding:11px; font-size:14px;}
  .field{ margin-bottom:14px;}
  .field label{ display:block; font-size:13px; font-weight:500; color:var(--ink-soft); margin-bottom:6px; }
  .field input, .field select{ width:100%; padding:13px 14px; border:1.5px solid var(--line);
    border-radius:var(--r-sm); font-family:var(--sans); font-size:15px; color:var(--ink);
    background:var(--surface); appearance:none; outline:none;}
  .field input:focus, .field select:focus{ border-color:var(--primary); }
  .field .hint{ font-size:11.5px; color:var(--ink-faint); margin-top:5px;}
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  /* onboarding ekranlari — .screen.active orqali flex-column bo'ladi, ortig'i scroll bo'ladi */
  .screen.onb{ padding:calc(46px + env(safe-area-inset-top,0px)) 22px calc(30px + env(safe-area-inset-bottom,0px)); min-height:100%;
    background:
      radial-gradient(120% 75% at 12% 0%, rgba(31,192,214,.42) 0%, rgba(31,192,214,0) 55%),
      radial-gradient(130% 90% at 100% 100%, rgba(10,74,66,.70) 0%, rgba(10,74,66,0) 60%),
      linear-gradient(158deg,#11A294 0%,#0E7C6B 46%,#0A4A42 100%);
    color:#fff; overflow-y:auto; -webkit-overflow-scrolling:touch; position:relative; }
  .screen.onb > *{ position:relative; z-index:1; }
  /* butun yashil fon bo'ylab oqar suv teksturasi */
  .screen.onb::before{ content:""; position:absolute; inset:0; z-index:0; pointer-events:none;
    background:url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPScxMjAnIGhlaWdodD0nMjInIHZpZXdCb3g9JzAgMCAxMjAgMjInPjxwYXRoIGQ9J00wIDExIHEzMCAtNiA2MCAwIHQ2MCAwJyBmaWxsPSdub25lJyBzdHJva2U9JyNmZmZmZmYnIHN0cm9rZS13aWR0aD0nMS42Jy8+PC9zdmc+") repeat; background-size:120px 22px; opacity:.13;
    animation:slWave 12s linear infinite; }
  /* pastki nozik yorug'lik */
  .screen.onb::after{ content:""; position:absolute; left:0; right:0; bottom:0; height:160px; z-index:0;
    background:radial-gradient(80% 120% at 50% 140%, rgba(255,255,255,.10) 0%, rgba(255,255,255,0) 60%);
    pointer-events:none; }
  .onb-logo{ width:108px; height:auto; display:block; margin:6px auto 8px;
    filter:drop-shadow(0 10px 22px rgba(0,0,0,.30)); position:relative; z-index:1; }
  .onb .brand{ text-align:center; font-size:13px; opacity:.9; margin-bottom:24px; letter-spacing:.3px;}
  .onb .card{ color:var(--ink);}
  /* ticker */
  .ticker{ background:linear-gradient(165deg,#0F3F39,#0B2C28); border-radius:var(--r);
    padding:18px; color:#fff; box-shadow:var(--shadow); position:relative; overflow:hidden;}
  .ticker .lbl{ font-size:11px; letter-spacing:1.5px; text-transform:uppercase; opacity:.6;}
  .ticker .big{ font-family:var(--mono); font-weight:700; font-size:50px; line-height:1; margin:4px 0 2px; letter-spacing:-1px;}
  .ticker .unit{ font-size:18px; opacity:.6; font-weight:500;}
  .ticker .delta{ font-family:var(--mono); font-size:12.5px; }
  .ticker .metarow{ display:flex; gap:18px; margin-top:14px; padding-top:14px; border-top:1px solid rgba(255,255,255,.12);}
  .ticker .metarow .m .k{ font-size:11px; opacity:.55; text-transform:uppercase; letter-spacing:.5px;}
  .ticker .metarow .m .v{ font-family:var(--mono); font-size:18px; font-weight:700; margin-top:2px;}
  .ticker .statusdot{ position:absolute; top:16px; right:16px;}
  /* chart */
  .ranges{ display:flex; gap:7px; margin-bottom:10px; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:2px;}
  .ranges::-webkit-scrollbar{ display:none;}
  .ranges button{ flex:0 0 auto; padding:8px 13px; border:1.5px solid var(--line); background:var(--surface);
    border-radius:9px; font-family:var(--sans); font-size:12.5px; font-weight:600; color:var(--ink-soft); cursor:pointer; white-space:nowrap;}
  .ranges button.on{ background:var(--primary); color:#fff; border-color:var(--primary);}
  .legend{ display:flex; gap:14px; justify-content:center; margin:2px 0 8px; font-size:11.5px; color:var(--ink-soft);}
  .legend span{ display:inline-flex; align-items:center; gap:5px;}
  .legend i{ width:16px; height:0; border-top:2.5px solid var(--ink-soft); display:inline-block;}
  canvas{ width:100%; display:block; border-radius:var(--r-sm); touch-action:none;}
  .readout{ font-family:var(--mono); font-size:13px; text-align:center; margin-top:8px;
    min-height:18px; font-weight:700; letter-spacing:.3px;}
  .readout .tm{ color:var(--ink-soft); font-weight:500; margin-right:6px;}
  /* tabs */
  .tabs{ display:flex; gap:4px; background:var(--surface-2); padding:4px; border-radius:12px; margin-bottom:16px;}
  .tabs button{ flex:1; padding:9px 4px; border:none; background:none; border-radius:9px;
    font-family:var(--sans); font-size:12.5px; font-weight:600; color:var(--ink-soft); cursor:pointer;}
  .tabs button.on{ background:var(--surface); color:var(--primary); box-shadow:0 1px 4px rgba(0,0,0,.06);}
  .relay{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:6px;}
  .relay button{ padding:14px 6px; border:1.5px solid var(--line); background:var(--surface);
    border-radius:var(--r-sm); font-family:var(--sans); font-weight:600; font-size:13px;
    color:var(--ink-soft); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:6px;}
  .relay button .ic{ font-size:20px;}
  .relay button.on[data-m="auto"]{ background:#E7F0FB; border-color:#9FC2EC; color:#1A5DA8;}
  .relay button.on[data-m="on"]{ background:#DBF4F8; border-color:#7FD4E0; color:#0B6B79;}
  .kv{ display:flex; justify-content:space-between; align-items:center; padding:11px 0; border-bottom:1px solid var(--line-soft); font-size:14px;}
  .kv:last-child{ border-bottom:none;}
  .kv .k{ color:var(--ink-soft);} .kv .v{ font-family:var(--mono); font-weight:700;}
  .kv .v.big{ font-size:18px; color:var(--primary);}
  .empty{ text-align:center; padding:40px 20px; color:var(--ink-soft);}
  .empty .ic{ font-size:40px; margin-bottom:10px; line-height:0;}
  .menu-item .ic{ color:var(--primary); }
  .menu-item .ic svg,.nav button .ic svg,.empty .ic svg,.opt .t svg,.bell svg,.relay button .ic svg{ vertical-align:middle; }
  .opt .t svg{ margin-right:8px; color:var(--primary); }
  .empty .t{ font-weight:600; color:var(--ink); margin-bottom:4px;}
  .toast{ position:fixed; left:50%; bottom:84px; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#fff; padding:11px 18px; border-radius:24px; font-size:13.5px;
    font-weight:500; opacity:0; transition:.3s; z-index:60; max-width:88%; text-align:center; box-shadow:0 8px 24px rgba(0,0,0,.25);}
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0);}
  .notif{ display:flex; gap:12px; padding:14px; border-radius:var(--r-sm); background:var(--surface); border:1px solid var(--line); margin-bottom:10px;}
  .notif .ic{ width:38px; height:38px; border-radius:10px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:18px;}
  .notif .nm .t{ font-weight:600; font-size:14px;} .notif .nm .s{ font-size:12.5px; color:var(--ink-soft);}
  .notif .tm{ font-size:11px; color:var(--ink-faint); margin-left:auto; white-space:nowrap;}
  .prof-head{ text-align:center; padding:8px 0 18px;}
  .avatar{ width:76px; height:76px; border-radius:50%; margin:0 auto 12px;
    background:linear-gradient(150deg,#0E7C6B,#15AEC2); color:#fff; font-size:28px; font-weight:700;
    display:flex; align-items:center; justify-content:center;}
  .menu-item{ display:flex; align-items:center; gap:14px; padding:15px 16px; background:var(--surface); border:1px solid var(--line); border-radius:var(--r-sm); margin-bottom:10px; cursor:pointer;}
  .menu-item .ic{ font-size:19px; width:24px; text-align:center;}
  .menu-item .t{ flex:1; font-weight:500; font-size:14.5px;}
  .menu-item .ar{ color:var(--ink-faint);}
  .statgrid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:16px;}
  .statgrid .s{ background:var(--surface); border:1px solid var(--line); border-radius:var(--r-sm); padding:14px 8px; text-align:center;}
  .statgrid .s .n{ font-family:var(--mono); font-weight:700; font-size:22px; color:var(--primary);}
  .statgrid .s .l{ font-size:11px; color:var(--ink-soft); margin-top:2px;}
  .avatar-edit{ position:relative; width:96px; height:96px; margin:0 auto 8px; cursor:pointer;}
  .avatar-edit img, .avatar-edit .ph{ width:96px; height:96px; border-radius:50%; object-fit:cover; display:block;
    background:linear-gradient(150deg,#0E7C6B,#15AEC2); color:#fff; font-size:34px; font-weight:700;
    align-items:center; justify-content:center; display:flex;}
  .avatar-edit .cam{ position:absolute; bottom:0; right:0; width:30px; height:30px; border-radius:50%;
    background:var(--primary); color:#fff; border:2.5px solid var(--bg); display:flex; align-items:center; justify-content:center; font-size:14px;}
  .opt{ display:flex; align-items:center; gap:12px; padding:15px 16px; background:var(--surface);
    border:1px solid var(--line); border-radius:var(--r-sm); margin-bottom:10px; cursor:pointer;}
  .opt .t{ flex:1; font-weight:500; font-size:14.5px;}
  .opt .ck{ color:var(--primary); font-size:18px; font-weight:700;}
  .opt .val{ color:var(--ink-soft); font-size:13px;}
  .pin-in{ text-align:center; letter-spacing:10px; font-size:22px; font-family:var(--mono);}
  .drag{ cursor:grab; color:var(--ink-faint); font-size:18px; padding:8px 4px; touch-action:none; user-select:none; line-height:.7;}
  .lake-card.dragging{ opacity:.92; box-shadow:0 14px 30px rgba(0,0,0,.18); transform:scale(1.02); z-index:5; position:relative;}
  .photo-grid{ display:flex; flex-wrap:wrap; gap:10px;}
  .photo-th{ position:relative; width:66px; height:66px; border-radius:14px; overflow:hidden; border:2px solid var(--line);}
  .photo-th.on{ border-color:var(--primary);}
  .photo-th img{ width:100%; height:100%; object-fit:cover; display:block; cursor:pointer;}
  .photo-th .rm{ position:absolute; top:2px; right:2px; width:20px; height:20px; border-radius:50%;
    background:rgba(0,0,0,.55); color:#fff; font-size:14px; display:flex; align-items:center; justify-content:center; cursor:pointer; line-height:1;}
  .photo-th .badge{ position:absolute; bottom:2px; left:2px; background:var(--primary); color:#fff;
    width:18px; height:18px; border-radius:50%; font-size:11px; display:flex; align-items:center; justify-content:center;}
  .photo-add{ width:66px; height:66px; border-radius:14px; border:2px dashed var(--line);
    display:flex; align-items:center; justify-content:center; font-size:26px; color:var(--ink-faint); cursor:pointer; background:var(--surface-2);}
  .addbtn{ position:fixed; bottom:calc(84px + env(safe-area-inset-bottom,0px)); right:max(16px, calc(50% - 240px + 16px));
    width:54px; height:54px; border-radius:50%; background:var(--primary); color:#fff;
    border:none; font-size:28px; box-shadow:0 8px 22px rgba(10,92,80,.4); cursor:pointer; z-index:25;}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- ONBOARDING -->
  <div class="onb screen" id="s-register">
    <img class="onb-logo" src="" data-logo alt="Smart Lake">
    <div class="brand">Baliq ko'llaringizni kaftingizda boshqaring</div>
    <div class="card">
      <div style="font-weight:600; font-size:17px; margin-bottom:14px;">Ro'yxatdan o'tish</div>
      <div class="row2">
        <div class="field"><label>Ism</label><input id="r-ism" placeholder="Aziz"></div>
        <div class="field"><label>Familiya</label><input id="r-fam" placeholder="Karimov"></div>
      </div>
      <div class="field"><label>Viloyat</label><select id="r-vil"></select></div>
      <div class="field"><label>Tuman</label><input id="r-tum" placeholder="masalan: Yangiyo'l"></div>
      <button class="btn" onclick="registerUser()">Davom etish</button>
    </div>
  </div>

  <!-- LOCK (PIN) -->
  <div class="onb screen" id="s-lock">
    <img class="onb-logo" src="" data-logo alt="Smart Lake">
    <div class="brand">PIN kodni kiriting</div>
    <div class="card" style="max-width:280px;margin:0 auto;color:var(--ink)">
      <input id="lock-pin" class="pin-in" type="password" inputmode="numeric" maxlength="6" placeholder="••••" style="width:100%;padding:13px;border:1.5px solid var(--line);border-radius:var(--r-sm);outline:none">
      <button class="btn" style="margin-top:12px" onclick="checkLock()">Kirish</button>
      <div id="lock-err" style="color:var(--crit);font-size:12px;text-align:center;margin-top:8px;min-height:14px;"></div>
    </div>
  </div>

  <!-- AUTH (Kirish / Ro'yxatdan o'tish) -->
  <div class="onb screen" id="s-auth">
    <img class="onb-logo" src="" data-logo alt="Smart Lake">
    <div class="brand">Baliq ko'llaringizni kaftingizda boshqaring</div>
    <div class="card" style="color:var(--ink)">
      <div style="display:flex;gap:8px;margin-bottom:16px">
        <button id="au-tab-login" class="btn" style="flex:1" onclick="setAuthMode('login')">Kirish</button>
        <button id="au-tab-reg" class="btn ghost" style="flex:1" onclick="setAuthMode('register')">Ro'yxatdan o'tish</button>
      </div>
      <div id="au-reg-fields" style="display:none">

<!-- Firebase (real-time ma'lumot uchun) -->
<!-- Firebase SDK: lokal (APK offline ishga tushishi uchun) -->
<script src="vendor/firebase-app-compat.js"></script>
<script src="vendor/firebase-auth-compat.js"></script>

<script>
/* ===== STORAGE (localStorage — hosting'da har telefonda saqlanadi) ===== */
const mem={};
function dbGet(k){ try{const v=localStorage.getItem('sl_'+k); if(v!==null) return JSON.parse(v);}catch(e){} return mem[k]??null; }
function dbSet(k,v){ mem[k]=v; try{localStorage.setItem('sl_'+k, JSON.stringify(v));}catch(e){}
  /* Lokal rejim (Firebase yo'q): joriy akkauntga profil/ko'llarni sinxron saqlash */
  if(!fbDb && CURRENT_EMAIL && (k==='user'||k==='lakes')){
    try{ const a=dbGet('accounts')||{}; if(a[CURRENT_EMAIL]){
      if(k==='user') a[CURRENT_EMAIL].profile=v; else a[CURRENT_EMAIL].lakes=v;
      mem.accounts=a; localStorage.setItem('sl_accounts', JSON.stringify(a));
    } }catch(e){}
  }
  if(_loadingCloud || !AUTH_UID || !fbDb) return;
  try{
    if(k==='lakes'){ const o={}; (v||[]).forEach(L=>{ if(L&&L.id) o[L.id]=L; }); fbDb.ref('users/'+AUTH_UID+'/lakes').set(o); }
    else if(k==='user'){ fbDb.ref('users/'+AUTH_UID+'/profile').set(v); }
  }catch(e){}
}

/* ===== FIREBASE (real-time ma'lumot) =====
   Gateway har ko'l NODE'sini /nodes/<AQid>/latest ga yozadi.
   Ko'lning id'si (AQxxxxxx) NODE id bilan aynan mos kelishi kerak. */
let LIVE={}, HIST={}, REG={}, ANNOUNCE=[], fbDb=null, fbAuth=null, fbReady=false, AUTH_UID=null, _loadingCloud=false, _entered=false, _subbed=false, CURRENT_EMAIL=null; const histSubs={};
const LIVE_FRESH_MS=15*60*1000; // 15 daqiqadan eski bo'lsa shu ko'l "demo"ga qaytadi
function fbConfigured(){ return typeof firebase!=='undefined' && typeof FIREBASE_CONFIG!=='undefined'
  && FIREBASE_CONFIG.databaseURL && String(FIREBASE_CONFIG.apiKey||'').indexOf('XXXX')<0; }
function fbInit(){
  try{
    if(!fbConfigured()){ fbBadge(false); return false; }
    firebase.initializeApp(FIREBASE_CONFIG);
    fbDb=firebase.database(); fbAuth=firebase.auth();
    fbAuth.onAuthStateChanged(u=>onAuth(u));
    return true;
  }catch(e){ fbBadge(false); return false; }
}
/* Akkaunt holati: kirgan bo'lsa -> bulutdan ma'lumot, aks holda -> kirish ekrani */
function onAuth(u){
  if(u){ AUTH_UID=u.uid; fbBadge(true); _entered=false; subscribeData(); loadCloudUser(); }
  else { AUTH_UID=null; USER=null; LAKES=[]; _entered=false;
    try{['user','lakes'].forEach(k=>{localStorage.removeItem('sl_'+k); mem[k]=null;});}catch(e){}
    showScreen('s-auth'); setAuthMode('login'); }
}
function subscribeData(){
  if(_subbed) return; _subbed=true;
  fbDb.ref('nodes').on('value', snap=>{
    const v=snap.val()||{}; LIVE={};
    Object.keys(v).forEach(id=>{ if(v[id]&&v[id].latest) LIVE[id]=v[id].latest; });
    fbReady=true;
    Object.keys(LIVE).forEach(id=>{ if(histSubs[id]) return; histSubs[id]=true;
      fbDb.ref('nodes/'+id+'/history').limitToLast(300).on('value', hs=>{ const hv=hs.val()||{};
        HIST[id]=Object.keys(hv).map(k=>{const r=hv[k]||{};return {t:(+r.ts||+k),do:+r.do,ph:+r.ph,temp:+r.t};}).filter(x=>x.t).sort((a,b)=>a.t-b.t); }); });
    if(document.getElementById('s-main') && document.getElementById('s-main').classList.contains('active')) liveTick();
  }, ()=>{});
  fbDb.ref('registry').on('value', s=>{ REG=s.val()||{};
    if(document.getElementById('s-main') && document.getElementById('s-main').classList.contains('active') && view==='lakes') renderLakes(); }, ()=>{});
  /* E'lonlar (admin yuboradi) — viloyat bo'yicha filtrlanadi */
  fbDb.ref('announcements').limitToLast(50).on('value', s=>{ const v=s.val()||{};
    ANNOUNCE=Object.keys(v).map(k=>Object.assign({id:k},v[k])).sort((a,b)=>(b.ts||0)-(a.ts||0));
    if(document.getElementById('s-main') && document.getElementById('s-main').classList.contains('active')){ updateBell(); if(view==='notif') renderNotif(); }
  }, ()=>{});
}
/* Bulutdan shu foydalanuvchi profili + ko'llari (istalgan telefonda bir xil) */
function loadCloudUser(){
  if(!AUTH_UID||!fbDb) return;
  fbDb.ref('users/'+AUTH_UID+'/profile').on('value', s=>{
    const pr=s.val(); if(pr){ _loadingCloud=true; USER=pr; if(!USER.photos)USER.photos=[]; dbSet('user',USER); _loadingCloud=false; }
    afterCloudLoad();
    if(document.getElementById('s-main').classList.contains('active') && view==='profile') renderProfile();
  }, ()=>{});
  fbDb.ref('users/'+AUTH_UID+'/lakes').on('value', s=>{
    const v=s.val()||{}; _loadingCloud=true; LAKES=Object.keys(v).map(k=>v[k]); dbSet('lakes',LAKES); _loadingCloud=false;
    if(document.getElementById('s-main').classList.contains('active') && view==='lakes') renderLakes();
  }, ()=>{});
}
function afterCloudLoad(){
  if(_entered || !USER) return; _entered=true;
  if(getPin()){ showScreen('s-lock'); setTimeout(()=>{const e=document.getElementById('lock-pin'); if(e)e.focus();},150); }
  else enterApp();
}
function liveFor(L){
  if(!L||!L.id) return null;
  const d=LIVE[L.id];
  if(!d||typeof d.ts!=='number') return null;
  if(Date.now()-d.ts > LIVE_FRESH_MS) return null;
  return d;
}
function fbSendCmd(id,obj){
  if(!fbDb||!id) return;
  try{ fbDb.ref('commands').push(Object.assign({node:id, ts:Date.now()}, obj)); }catch(e){}
}
/* Ko'l admin tomonidan tasdiqlanganmi? (Firebase yo'q bo'lsa — demo, doim ochiq) */
function lakeApproved(L){ if(!fbReady) return true; if(L && L.status==='demo') return true; return !!(L && REG[L.id] && REG[L.id].approved===true); }
/* Yangi ko'l so'rovini adminga yuborish */
function fbSendRequest(id,name){ if(!fbDb) return;
  try{ const u=USER||{}; fbDb.ref('requests').push({chip:id, lake:name||id, uid:AUTH_UID||'',
    farmer:((u.ism||'')+' '+(u.fam||'')).trim()||'(fermer)', region:u.vil||'', phone:u.phone||'', ts:Date.now(), status:'pending'}); }catch(e){} }
function fbBadge(on){
  let b=document.getElementById('fb-badge');
  if(!b){ b=document.createElement('div'); b.id='fb-badge';
    b.style.cssText='position:fixed;left:8px;bottom:8px;z-index:60;font:600 10px/1.4 var(--sans);padding:4px 9px;border-radius:20px;opacity:.92;box-shadow:0 2px 8px rgba(0,0,0,.15)';
    if(document.body) document.body.appendChild(b); }
  if(on){ b.style.background='#1E9E6A'; b.style.color='#fff'; b.textContent='\ud83d\udfe2 Firebase'; }
  else  { b.style.background='#E9EFED'; b.style.color='#5E736E'; b.textContent='\u26aa Demo'; }
}

/* ===== KONSTANTALAR ===== */
const VILOYATLAR=["Andijon","Buxoro","Farg'ona","Jizzax","Xorazm","Namangan","Navoiy",
  "Qashqadaryo","Qoraqalpog'iston","Samarqand","Sirdaryo","Surxondaryo","Toshkent viloyati","Toshkent shahri"];

/* Sazan (carp) uchun, O'zbekiston sharoitiga moslangan zona qiymatlari */
const PARAMS={
  do:  {label:"DO", unit:"mg/L", dmin:0,  dmax:12, dash:[],     good:v=>v>=5,            warn:v=>v>=3},
  ph:  {label:"pH", unit:"",     dmin:5,  dmax:10, dash:[7,5],  good:v=>v>=6.5&&v<=9.0,  warn:v=>v>=6.0&&v<=9.5},
  temp:{label:"T",  unit:"°C",   dmin:5,  dmax:35, dash:[2,5],  good:v=>v>=20&&v<=30,    warn:v=>v>=14&&v<=34},
};
function zoneCol(p,v){ const P=PARAMS[p]; return P.good(v)?'#1E9E6A':P.warn(v)?'#E0922F':'#DC4B3E'; }

const RANGES=[['1s','1 soat'],['6s','6 soat'],['24s','24 soat'],['hafta','Hafta'],['oy','Oy'],['3oy','3 oy'],['yil','Yil']];
const RCONF={ '1s':[60,60000], '6s':[72,300000], '24s':[96,900000],
  'hafta':[84,7200000], 'oy':[120,21600000], '3oy':[90,86400000], 'yil':[122,259200000] };

/* ===== STATE ===== */
let USER=null, LAKES=[], view='lakes', currentLake=null, curTab='mon', curRange='24s', liveTimer=null, suppressPush=false;
let chData=null, chGeom=null, chIdx=null;   // chart holati
function icon(name,size){ size=size||22; const B={waves:'<path d="M3 7c1.5 0 1.5 1.4 3 1.4S7.5 7 9 7s1.5 1.4 3 1.4S13.5 7 15 7s1.5 1.4 3 1.4S19.5 7 21 7"/><path d="M3 12c1.5 0 1.5 1.4 3 1.4S7.5 12 9 12s1.5 1.4 3 1.4S13.5 12 15 12s1.5 1.4 3 1.4S19.5 12 21 12"/><path d="M3 17c1.5 0 1.5 1.4 3 1.4S7.5 17 9 17s1.5 1.4 3 1.4S13.5 17 15 17s1.5 1.4 3 1.4S19.5 17 21 17"/>',bell:'<path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/>',user:'<path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/>',cpu:'<rect x="6" y="6" width="12" height="12" rx="2"/><rect x="9.5" y="9.5" width="5" height="5" rx="1"/><path d="M9 2.5v2M15 2.5v2M9 19.5v2M15 19.5v2M2.5 9h2M2.5 15h2M19.5 9h2M19.5 15h2"/>',gear:'<circle cx="12" cy="12" r="3.2"/><path d="M12 2.5v2.6M12 18.9v2.6M2.5 12h2.6M18.9 12h2.6M5.2 5.2l1.8 1.8M17 17l1.8 1.8M18.8 5.2 17 7M7 17l-1.8 1.8"/>',lifebuoy:'<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3.6"/><path d="M5.6 5.6l3.3 3.3M15.1 15.1l3.3 3.3M18.4 5.6l-3.3 3.3M5.6 18.4l3.3-3.3"/>',lock:'<rect x="4.5" y="11" width="15" height="9.5" rx="2"/><path d="M8 11V7.5a4 4 0 0 1 8 0V11"/>',sparkles:'<path d="M12 3.5l1.7 4.3 4.3 1.7-4.3 1.7L12 15.5l-1.7-4.3L6 9.5l4.3-1.7z"/><path d="M18.5 14.5l.8 1.9 1.9.8-1.9.8-.8 1.9-.8-1.9-1.9-.8 1.9-.8z"/>',clock:'<circle cx="12" cy="12" r="8.5"/><path d="M12 7.5V12l3 1.8"/>',check:'<circle cx="12" cy="12" r="8.5"/><path d="M8.3 12.4l2.4 2.4 4.6-5"/>',phone:'<path d="M21 16.5v2.6a2 2 0 0 1-2.2 2 19.4 19.4 0 0 1-8.4-3A19 19 0 0 1 4.5 14 19.4 19.4 0 0 1 1.5 5.5 2 2 0 0 1 3.5 3.3h2.6a2 2 0 0 1 2 1.7c.1.9.3 1.7.6 2.5a2 2 0 0 1-.5 2.1L7.1 8.9a15.5 15.5 0 0 0 6 6l1.3-1.1a2 2 0 0 1 2.1-.5c.8.3 1.6.5 2.5.6a2 2 0 0 1 1.7 2z"/>',send:'<path d="M21.5 2.5 10.5 13.5"/><path d="M21.5 2.5l-7 19-4-8.5-8.5-4z"/>',mail:'<rect x="3" y="5.5" width="18" height="13" rx="2.5"/><path d="M3.5 7l8.5 5.5L20.5 7"/>',globe:'<circle cx="12" cy="12" r="8.5"/><path d="M3.5 12h17"/><path d="M12 3.5c2.3 2.3 3.6 5.3 3.6 8.5S14.3 18.2 12 20.5c-2.3-2.3-3.6-5.3-3.6-8.5S9.7 5.8 12 3.5z"/>',power:'<path d="M12 3.5v8"/><path d="M6.8 6.8a7.5 7.5 0 1 0 10.4 0"/>'};
  return '<svg xmlns="http://www.w3.org/2000/svg" width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle">'+(B[name]||'')+'</svg>'; }

/* ===== SIMULATION (demo) ===== */
function rnd(s){ let x=Math.sin(s*9999)*10000; return x-Math.floor(x); }
function calcAt(L, tms){
  const s=L.seed, d=new Date(tms), h=d.getHours()+d.getMinutes()/60;
  const daily=Math.sin((h-6)/24*2*Math.PI);
  let dox=5.6+daily*1.7+Math.sin(tms/8e6+s)*0.5+(rnd(s+tms/9e7)*1.0-0.5);
  let ph =7.6+Math.sin(h/24*2*Math.PI+s)*0.7+(rnd(s+1+tms/8e7)*0.5-0.25);
  let t  =24 +Math.sin((h-3)/24*2*Math.PI)*4 +Math.sin(tms/2.6e9)*4+(rnd(s+2)*1.2-0.6);
  return { do:+Math.max(0.5,dox).toFixed(1), ph:+Math.max(5,Math.min(10,ph)).toFixed(1), temp:+t.toFixed(1) };
}
function lakeNow(L){
  const lv=liveFor(L);
  if(lv){ return {do:+(+lv.do).toFixed(1),ph:+(+lv.ph).toFixed(1),temp:+(+lv.t).toFixed(1),aer:+lv.aer||0,live:true}; }
  /* Real qurilma lekin ma'lumot kelmayapti (oflayn/bloklangan) -> -- ko'rsatamiz */
  if(fbReady && L.status!=='demo') return {offline:true,do:null,ph:null,temp:null};
  const n=calcAt(L, Date.now());
  if(L.mode==='on') n.do=+(n.do+1.2).toFixed(1);
  n.do=+(n.do+Math.sin(Date.now()/9000+L.seed)*0.2).toFixed(1);
  return n;
}
function lakeHistory(L, range){
  /* Faqat HAQIQIY tarix (/nodes/<id>/history). Soxta/demo ma'lumot to'qilmaydi. */
  const [n,step]=RCONF[range]; const now=Date.now();
  const from=now-(n-1)*step;
  const all=(HIST[L.id]&&HIST[L.id].length)?HIST[L.id]:[];
  return all.filter(p=>p.t>=from && isFinite(p.do));
}
function statusLevel(doVal){
  if(doVal>6)  return {key:'yaxshi',   label:'Yaxshi',      col:'#1E9E6A'};
  if(doVal>=4) return {key:'qoniqarli',label:'Qoniqarli',   col:'#D9A521'};
  if(doVal>=2) return {key:'yomon',    label:'Yomon',       col:'#E2660A'};
  return            {key:'olim',     label:"O'lim xavfi", col:'#DC4B3E'};
}
function statusOf(L){ const n=lakeNow(L); if(n.offline) return 'oflayn'; return statusLevel(n.do).key; }
function isProblem(L){ const k=statusOf(L); return k==='yomon'||k==='olim'; }
function aerOn(L){
  const lv=liveFor(L);
  if(lv && typeof lv.aer!=='undefined') return !!(+lv.aer);
  const n=lakeNow(L); if(n.offline) return false;
  return L.mode==='on'?true:(n.do||0)<(L.settings.minDo||5);
}
/* ===== LoRa SHLYUZ ALOQASI (demo) — gateway RSSI tushunchasiga mos ===== */
function linkOf(L){
  const lv=liveFor(L);
  if(lv){
    const rssi=(typeof lv.rssi==='number')?lv.rssi:-90;
    const q=Math.max(0,Math.min(1,(rssi+120)/60));
    const bars=q>0.75?3:q>0.5?2:q>0.28?1:0;
    return {online:true, rssi, bars, q};
  }
  const base=0.55+(rnd(L.seed+7)*0.40);               // barqaror sifat (seed bo'yicha)
  const q=Math.max(0,Math.min(1, base+Math.sin(Date.now()/12000+L.seed)*0.06));
  const rssi=Math.round(-115+q*55);                   // ~ -115..-60 dBm
  const bars=q>0.75?3:q>0.5?2:q>0.28?1:0;
  return {online:q>0.12, rssi, bars, q};
}
function linkBars(bars,onCol){ onCol=onCol||'#1E9E6A';
  return '<span style="display:inline-flex;align-items:flex-end;gap:1px;height:11px;vertical-align:-1px">'+
    [1,2,3].map(i=>`<span style="display:inline-block;width:3px;height:${3+i*3}px;border-radius:1px;background:${i<=bars?onCol:'#C7D3CF'}"></span>`).join('')+'</span>';
}
/* LoRa uchun RSSI sifat darajalari (adabiyot: SX1278 433 MHz) */
function rssiColor(rssi){ if(rssi>=-80) return '#1E9E6A'; if(rssi>=-100) return '#E0922F'; return '#DC4B3E'; }
function rssiLabel(rssi){ if(rssi>=-80) return 'Yaxshi'; if(rssi>=-100) return 'Qoniqarli'; return 'Yomon'; }
/* ===== AYRATOR ISHLASH VAQTINI KUZATISH (real Firebase ma'lumotiga asosan) ===== */
const AER_RUN_STATE={};
function aerTrackTick(L){
  const lv=liveFor(L); if(!lv) return;
  const isOn=!!(+lv.aer), now=Date.now();
  if(!AER_RUN_STATE[L.id]) AER_RUN_STATE[L.id]={wasOn:false,lastTs:now};
  const ar=AER_RUN_STATE[L.id];
  const elapsed=Math.min(now-ar.lastTs,60000);
  if(ar.wasOn&&isOn&&elapsed>500){
    const key='aerRun_'+L.id;
    let s=dbGet(key)||{todayMs:0,weekMs:0,monthMs:0,totalMs:0,lastDay:'',lastW:'',lastM:''};
    const td=new Date().toDateString();
    const tw=new Date(); tw.setDate(tw.getDate()-tw.getDay()); const twStr=tw.toDateString();
    const tmStr=new Date().getFullYear()+'-'+new Date().getMonth();
    if(s.lastDay!==td){s.todayMs=0;s.lastDay=td;}
    if(s.lastW!==twStr){s.weekMs=0;s.lastW=twStr;}
    if(s.lastM!==tmStr){s.monthMs=0;s.lastM=tmStr;}
    s.todayMs+=elapsed;s.weekMs+=elapsed;s.monthMs+=elapsed;s.totalMs+=elapsed;
    dbSet(key,s);
  }
  ar.wasOn=isOn;ar.lastTs=now;
}
function getAerRunH(L,range){
  const key='aerRun_'+L.id;
  const s=dbGet(key)||{todayMs:0,weekMs:0,monthMs:0,totalMs:0};
  const ms={kun:s.todayMs||0,hafta:s.weekMs||0,oy:s.monthMs||0,'3oy':s.totalMs||0}[range]||0;
  return +(ms/3600000).toFixed(2);

/* Baliq massasi: (oxirgi o'lchov yoki boshlang'ich) + (yem / FCR) */
function biomass(L){ const s=L.settings;
  const ms=(s.measurements||[]).slice().sort((a,b)=>a.date-b.date);
  let baseDate, baseAvg, cnt;
  if(ms.length){ const m=ms[ms.length-1]; baseDate=m.date; baseAvg=m.avgG; cnt=m.cnt||s.baliqSoni||0; }
  else { baseDate=s.stockDate||(Date.now()-90*86400000); baseAvg=s.oWeight||0; cnt=s.baliqSoni||0; }
  const initKg=cnt*baseAvg/1000;
  const log=(s.feedLog||[]).slice().sort((a,b)=>a.date-b.date);
  const integ=from=>{
    let c=0;
    for(let i=0;i<log.length;i++){
      const start=Math.max(log[i].date,from);
      const end=i<log.length-1?log[i+1].date:Date.now();
      const days=(end-start)/86400000;
      if(days>0) c+=log[i].kg*days;
      else if(i===log.length-1) c+=log[i].kg; /* bugungi yozuv = 1 kun */
    }
    return c;
  };
  const cumSince=integ(baseDate), cumAll=integ(s.stockDate||baseDate);
  const totalKg=initKg+cumSince/(s.fcr||1.5); const avgG=cnt>0?totalKg*1000/cnt:0;
  return {cnt, initKg:+initKg.toFixed(1), totalKg:+totalKg.toFixed(1), avgG:Math.round(avgG),
    cum:+cumAll.toFixed(1), measured:ms.length>0, lastM: ms.length?ms[ms.length-1]:null}; }

/* ===== YEM TURLARI (admin kiritadi — hozircha namuna seed) =====
   Har yem turi: baliq o'lchami (g) ustunlari + suv harorati qatorlari,
   qiymat = tana vazniga nisbatan kunlik foiz. (HUALONG SILIAO jadvalidan) */
const FEED_TYPES=[{
  id:'hualong', name:'HUALONG SILIAO',
  sizes:[{label:'20–100 g',min:20,max:100},{label:'100–300 g',min:100,max:300},
         {label:'300–600 g',min:300,max:600},{label:'600 g–1.2 kg',min:600,max:1200},{label:'1.2–2 kg',min:1200,max:2000}],
  temps:[{t:12,r:[0.5,0.75,0.75,0.75,0.75],times:['12:00']},
         {t:15,r:[1,1,1.5,1.3,1.0],times:['10:00','14:00']},
         {t:18,r:[2,2,2,1.5,1.5],times:['10:00','15:00']},
         {t:22,r:[3,3.5,3,2,2],times:['09:00','12:00','16:00']},
         {t:24,r:[4,4,3.5,3,2.5],times:['08:00','12:00','17:00']},
         {t:27,r:[5,3.5,4,4,3],times:['08:00','11:00','14:00','17:00']},
         {t:30,r:[4,3,2.5,2.5,3],times:['08:00','11:00','15:00','18:00']},
         {t:33,r:[3,2,2,2,1.75],times:['08:00','11:00','15:00','18:00']}]
}];
function feedTypeById(id){ return FEED_TYPES.find(f=>f.id===id); }
function feedRate(id, tempC, avgG){ const f=feedTypeById(id); if(!f) return null;
  let ci=f.sizes.findIndex(s=>avgG>=s.min && avgG<s.max);
  if(ci<0) ci = avgG<f.sizes[0].min ? 0 : f.sizes.length-1;
  let best=f.temps[0], bd=1e9; f.temps.forEach(row=>{ const d=Math.abs(row.t-tempC); if(d<bd){bd=d; best=row;} });
  return { rate:best.r[ci], rowTemp:best.t, sizeLabel:f.sizes[ci].label, times:best.times }; }
/* Ertangi yem tavsiyasi (suv harorati × o'lcham × massa, kislorod tuzatishi bilan) */
function recFeed(L){ const s=L.settings; if(!s.feedType) return {none:'type'};
  const b=biomass(L); if(!b.cnt||!b.totalKg) return {none:'data'};
  const _ln=lakeNow(L); const temp=WEATHER?WEATHER.avg:(_ln.offline?22:(_ln.temp||22));
  const fr=feedRate(s.feedType, temp, b.avgG); if(!fr) return {none:'type'};
  let kg=b.totalKg*fr.rate/100, note=''; const doNow=lakeNow(L).do;
  if(doNow<2){ kg=0; note="Kislorod juda past — bugun yem bermang"; }
  else if(doNow<4){ kg*=0.5; note="Kislorod past — yarmini bering"; }
  const n=fr.times.length, perFeed=kg>0?+(kg/n).toFixed(1):0;
  return { kg:+kg.toFixed(1), rate:fr.rate, temp:Math.round(temp), sizeLabel:fr.sizeLabel, note,
           feedName:feedTypeById(s.feedType).name, totalKg:b.totalKg, times:fr.times, perFeed, n }; }

function normEmail(e){ return String(e||'').trim().toLowerCase(); }
function localAuthSubmit(email, pass, err){
  email=normEmail(email);
  const accounts=dbGet('accounts')||{};
  if(authMode==='register'){
    const ism=val('au-ism'),fam=val('au-fam'),vil=val('au-vil'),tum=val('au-tum'),phone=val('au-phone');
    if(!ism||!fam){ err.textContent='Ism va familiyani kiriting'; return; }
    if(!vil){ err.textContent='Viloyatni tanlang'; return; }
    if(pass.length<6){ err.textContent='Parol kamida 6 belgi'; return; }
    if(accounts[email]){ err.textContent="Bu email allaqachon ro'yxatdan o'tgan"; return; }
    const prof={ism,fam,vil,tum,phone,email,role:'farmer',joined:Date.now(),photos:[]};
    accounts[email]={ pass, profile:prof, lakes:[] };
    dbSet('accounts', accounts);
    localSignIn(email);

  } else {
    const acc=accounts[email];
    if(!acc){ err.textContent='Bunday foydalanuvchi topilmadi'; return; }
    if(acc.pass!==pass){ err.textContent="Email yoki parol noto'g'ri"; return; }
    localSignIn(email);

/* ---- Tartiblash (ushlab tort) + 6-nuqtaga bosish -> o'chirish ---- */
let rDragEl=null, rList=null, isDragging=false, rStartY=0, rMoved=false, rId=null, delShowId=null;
function reorderStart(h,y){ rDragEl=h.closest('.lake-card'); rId=rDragEl.dataset.id; rStartY=y; rMoved=false; isDragging=true; }
function reorderMove(y){ if(!rDragEl||!rList) return;
  if(!rMoved && Math.abs(y-rStartY)>6){ rMoved=true; rDragEl.classList.add('dragging'); }
  if(!rMoved) return;
  for(const c of rList.querySelectorAll('.lake-card')){ if(c===rDragEl) continue;
    const r=c.getBoundingClientRect(); if(y>r.top&&y<r.bottom){ rList.insertBefore(rDragEl, y>r.top+r.height/2? c.nextSibling : c); break; } } }
function reorderEnd(){ if(!rDragEl) return; const moved=rMoved, id=rId; rDragEl.classList.remove('dragging'); rDragEl=null; isDragging=false;
  if(moved){ const ids=[...rList.querySelectorAll('.lake-card')].map(c=>c.dataset.id); LAKES.sort((a,b)=>ids.indexOf(a.id)-ids.indexOf(b.id)); dbSet('lakes',LAKES); delShowId=null; }
  else { delShowId = (delShowId===id? null : id); }
  renderLakes(); applyLang(); }
function toggleDel(id){ delShowId=(delShowId===id?null:id); renderLakes(); applyLang(); }
function deleteLake(id){ const L=getLake(id); if(!confirm((L?L.name:"Ko'l")+" o'chirilsinmi?")) return;
  LAKES=LAKES.filter(x=>x.id!==id); dbSet('lakes',LAKES); delShowId=null; toast("Ko'l o'chirildi"); renderLakes(); applyLang(); }
function bindReorder(){ rList=document.getElementById('lake-list'); if(!rList) return;
  rList.querySelectorAll('[data-drag]').forEach(h=>{
    h.addEventListener('touchstart',e=>{ e.preventDefault(); e.stopPropagation(); reorderStart(h, e.touches[0].clientY); },{passive:false});
    h.addEventListener('mousedown',e=>{ e.preventDefault(); e.stopPropagation(); reorderStart(h, e.clientY); });
  });
  rList.addEventListener('touchmove',e=>{ if(rDragEl){ if(rMoved) e.preventDefault(); reorderMove(e.touches[0].clientY); } },{passive:false});
  rList.addEventListener('touchend', reorderEnd);
  rList.addEventListener('touchcancel', reorderEnd);
}

/* ---- Chart: 3 chiziq + zona ranglari + vertikal kursor ---- */
function drawChart(L){
  const cv=document.getElementById('chart'); if(!cv) return;
  const data=lakeHistory(L,curRange); chData=data;
  const dpr=window.devicePixelRatio||1, W=cv.clientWidth, H=300;
  cv.width=W*dpr; cv.height=H*dpr; const ctx=cv.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);
  if(!data || data.length<2){
    chGeom=null; chIdx=null;
    ctx.textAlign='center';
    ctx.fillStyle='#5E736E'; ctx.font='600 14px system-ui,-apple-system,sans-serif';
    ctx.fillText("Ma'lumot hali yetarli emas", W/2, H/2-6);
    ctx.fillStyle='#92A29E'; ctx.font='12px system-ui,-apple-system,sans-serif';
    ctx.fillText("Qurilma yangi ulangan — bu oraliq vaqt o'tishi bilan to'ldiriladi", W/2, H/2+16);
    ctx.textAlign='left';
    return;
  }
  const padL=6,padR=26,padT=12,padB=22, plotH=H-padT-padB, plotW=W-padL-padR;
  const [rN,rStep]=RCONF[curRange]; const tNow=Date.now(); const tFrom=tNow-(rN-1)*rStep; const tSpan=(tNow-tFrom)||1;
  const X=t=>padL+Math.max(0,Math.min(1,(t-tFrom)/tSpan))*plotW;
  const Y=(p,v)=>{ const P=PARAMS[p]; let r=(v-P.dmin)/(P.dmax-P.dmin); r=Math.max(0,Math.min(1,r)); return padT+(1-r)*plotH; };
  chGeom={X,Y,padL,padR,padT,padB,plotW,plotH,W,H,tFrom,tNow,tSpan};
  // ozgina gorizontal grid
  ctx.strokeStyle='#EAF0EE'; ctx.lineWidth=1;
  for(let g=0;g<=3;g++){ const y=padT+g/3*plotH; ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(W-padR,y); ctx.stroke(); }
  // chiziqlar (zona-rangli segmentlar)
  function drawLine(p){ const P=PARAMS[p];
    for(let i=0;i<data.length-1;i++){ const v1=data[i][p], v2=data[i+1][p];
      const col=zoneCol(p, Math.min(v1,v2)===v1? worse(p,v1,v2):worse(p,v1,v2));
      ctx.beginPath(); ctx.setLineDash(P.dash); ctx.lineWidth=p==='do'?2.4:1.8;
      ctx.strokeStyle=col; ctx.moveTo(X(data[i].t),Y(p,v1)); ctx.lineTo(X(data[i+1].t),Y(p,v2)); ctx.stroke(); }
    ctx.setLineDash([]);
    // oxirgi yorliq
    const li=data.length-1; ctx.fillStyle='#5E736E'; ctx.font='700 10px '+monoFam();
    ctx.fillText(P.label, X(data[li].t)+4, Y(p,data[li][p])+3);
  }
  ['temp','ph','do'].forEach(drawLine);
  // x vaqt belgilari
  ctx.fillStyle='#92A29E'; ctx.font='10px '+monoFam(); ctx.textAlign='left';
  ctx.fillText(fmtT(tFrom), padL, H-6);
  ctx.textAlign='center'; ctx.fillText(fmtT((tFrom+tNow)/2), padL+plotW/2, H-6);
  ctx.textAlign='right'; ctx.fillText(fmtT(tNow), W-padR, H-6); ctx.textAlign='left';
  // kursor
  if(chIdx===null) chIdx=data.length-1;
  drawCursor();
}
function worse(p,a,b){ // zonasi yomonroq bo'lgan qiymatni qaytaradi (rang shu bo'yicha)
  const rank=v=>{const P=PARAMS[p]; return P.good(v)?0:P.warn(v)?1:2;};
  return rank(a)>=rank(b)?a:b;
}
function drawCursor(){
  const cv=document.getElementById('chart'); if(!cv||!chData||!chGeom) return;
  // qayta chizmaymiz — ustiga overlay uchun butun chizishni takrorlash kerak; shuning uchun
  // drawChart oxirida chaqiriladi va move'da drawChart qayta ishlaydi.
  const {X,Y,padT,plotH}=chGeom; const ctx=cv.getContext('2d'); const i=chIdx; const d=chData[i];
  ctx.save(); ctx.strokeStyle='rgba(17,48,43,.35)'; ctx.setLineDash([4,4]); ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(X(d.t),padT-4); ctx.lineTo(X(d.t),padT+plotH+2); ctx.stroke(); ctx.setLineDash([]);
  ['do','ph','temp'].forEach(p=>{ const y=Y(p,d[p]); ctx.beginPath(); ctx.arc(X(d.t),y,4,0,7);
    ctx.fillStyle=zoneCol(p,d[p]); ctx.fill(); ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke(); });
  ctx.restore();
  // pastdagi o'qish
  const ro=document.getElementById('readout');
  if(ro){ const c=p=>zoneCol(p,d[p]);
    ro.innerHTML=`<span class="tm">${fmtFull(d.t)}</span>`+
      `<span style="color:${c('do')}">DO ${d.do.toFixed(1)}</span>&nbsp;&nbsp;`+
      `<span style="color:${c('ph')}">pH ${d.ph.toFixed(1)}</span>&nbsp;&nbsp;`+
      `<span style="color:${c('temp')}">T ${Math.round(d.temp)}°</span>`; }
}
function bindChart(){
  const cv=document.getElementById('chart'); if(!cv) return;
  const move=clientX=>{ if(!chGeom||!chData||!chData.length) return; const r=cv.getBoundingClientRect();
    const frac=Math.max(0,Math.min(1,(clientX-r.left-chGeom.padL)/chGeom.plotW));
    const tt=chGeom.tFrom+frac*(chGeom.tNow-chGeom.tFrom);
    let best=0,bd=Infinity; for(let k=0;k<chData.length;k++){ const dd=Math.abs(chData[k].t-tt); if(dd<bd){bd=dd;best=k;} }
    if(best===chIdx) return; chIdx=best;
    const L=getLake(currentLake); drawChart(L); };
  cv.ontouchstart=e=>{ move(e.touches[0].clientX); };
  cv.ontouchmove=e=>{ move(e.touches[0].clientX); e.preventDefault(); };
  cv.onmousedown=e=>{ move(e.clientX); cv._drag=true; };
  cv.onmousemove=e=>{ if(cv._drag) move(e.clientX); };
  window.addEventListener('mouseup',()=>{ if(cv)cv._drag=false; });
}
function monoFam(){ return "'JetBrains Mono',monospace"; }
function fmtT(t){ const d=new Date(t); const multi=['hafta','oy','3oy','yil'].includes(curRange);
  return multi? (d.getDate()+'/'+(d.getMonth()+1)) : (p2(d.getHours())+':'+p2(d.getMinutes())); }
function fmtFull(t){ const d=new Date(t); return p2(d.getMonth()+1)+'/'+p2(d.getDate())+' '+p2(d.getHours())+':'+p2(d.getMinutes()); }
function p2(n){ return ('0'+n).slice(-2); }

function myAnnounce(){

function annSeenKey(){ return 'annSeen'; }
function markAnnounceSeen(){ const ids=(myAnnounce()||[]).map(a=>a.id); dbSet(annSeenKey(), ids); }
function unseenAnnounceCount(){ const seen=dbGet(annSeenKey())||[]; return (myAnnounce()||[]).filter(a=>seen.indexOf(a.id)<0).length; }
function critLakes(){ return LAKES.filter(L=>statusOf(L)==='olim'); }
function annTime(ts){ const d=new Date(ts); const diff=Date.now()-ts;
  if(diff<3600000) return Math.max(1,Math.floor(diff/60000))+' daq oldin';
  if(diff<86400000) return Math.floor(diff/3600000)+' soat oldin';
  return p2(d.getMonth()+1)+'/'+p2(d.getDate())+' '+p2(d.getHours())+':'+p2(d.getMinutes()); }
function renderNotif(){ const C=document.getElementById('content');
  markAnnounceSeen(); updateBell();

      <div class="tm">${annTime(a.ts||Date.now())}</div></div>`).join('') : '';
  const olim=LAKES.filter(L=>statusOf(L)==='olim'), yomon=LAKES.filter(L=>statusOf(L)==='yomon');
  const alertHTML = (olim.length||yomon.length) ?
    (anns.length?`<div class="sec-h">Ogohlantirishlar</div>`:'')+
    olim.map(L=>notifRow('🔴','#FBE3E0',"O'lim xavfi", L.name+' — DO '+lakeNow(L).do+' mg/L','hozir')).join('')+
    yomon.map(L=>notifRow('🟠','#FCE6D6','Yomon — past kislorod', L.name+' — DO '+lakeNow(L).do+' mg/L','hozir')).join('') : '';
  if(!annHTML && !alertHTML){ C.innerHTML=`<div class="empty"><div class="ic" style="color:var(--good)">${icon('check',40)}</div>
    <div class="t">Hammasi joyida</div><div>Yangi e'lon yoki ogohlantirish yo'q.</div></div>`; return; }
  C.innerHTML=annHTML+alertHTML; }

function avatarHTML(sz){ const p=activePhoto(); return p

function logout(){ if(!confirm("Hisobdan chiqasizmi?")) return;
  try{ ['pin','lang'].forEach(k=>localStorage.removeItem('sl_'+k)); }catch(e){}
  mem.pin=null; delShowId=null; _entered=false;
  if(fbAuth){ try{ fbAuth.signOut(); }catch(e){} return; }
  try{ ['user','lakes','session'].forEach(k=>localStorage.removeItem('sl_'+k)); }catch(e){}

  showScreen('s-auth'); setAuthMode('login'); }

/* ===== TIL / I18N ===== */
function getLang(){ return dbGet('lang')||'uz-latin'; }
const LANG_LABEL={'uz-latin':"O'zbek (lotin)",'uz-cyrillic':"Ўзбек (кирилл)",'ru':"Русский"};
const KEEP=new Set(['DO','pH','PH','T','mg','L','kWh','kW','kg','SMS','ID','PIN','UZS','Smart','Lake','m']);
function translitWord(w){
  const dg=[["o‘","ў"],["o'","ў"],["o’","ў"],["O‘","Ў"],["O'","Ў"],["g‘","ғ"],["g'","ғ"],["g’","ғ"],["G‘","Ғ"],["G'","Ғ"],
    ["sh","ш"],["Sh","Ш"],["SH","Ш"],["ch","ч"],["Ch","Ч"],["CH","Ч"],["yo","ё"],["Yo","Ё"],["yu","ю"],["Yu","Ю"],["ya","я"],["Ya","Я"]];
  let s=w; dg.forEach(([a,b])=>{ s=s.split(a).join(b); });
  const map={a:'а',b:'б',c:'к',d:'д',e:'е',f:'ф',g:'г',h:'ҳ',i:'и',j:'ж',k:'к',l:'л',m:'м',n:'н',o:'о',p:'п',q:'қ',r:'р',s:'с',t:'т',u:'у',v:'в',w:'в',x:'х',y:'й',z:'з'};
  let out=''; for(const ch of s){ const low=ch.toLowerCase(); if(map[low]){ const c=map[low]; out+= ch===low?c:c.toUpperCase(); } else out+=ch; }
  return out;
}
function translitWords(text){
  return text.replace(/[A-Za-z'‘’ʻ`]+(?:\/[A-Za-z]+)?/g, w=>{
    if(/\d/.test(w)||KEEP.has(w)) return w; return translitWord(w); });
}

  "Ro'yxatdan o'tish":"Регистрация","Ism":"Имя","Familiya":"Фамилия","Viloyat":"Область","Tuman":"Район","Davom etish":"Продолжить","Tanlang":"Выберите",
  "Monitoring":"Мониторинг","Tavsiyalar":"Рекомендации","Tarix":"История","Sozlamalar":"Настройки",

  "Elektr energiya sarfi":"Расход электроэнергии","Dinamika (sazan baliqi me'yorlari)":"Динамика (нормы карпа)",
  "Ko'l qo'shish":"Добавить озеро","Ko'lni qo'shish":"Добавить озеро","Yangi ko'l ulash":"Подключить новое озеро","Qurilma ID":"ID устройства","Ko'l nomi":"Название озера","Bekor qilish":"Отмена",

  "Til":"Язык","Telefon raqam":"Номер телефона","Rasmni o'zgartirish":"Изменить фото","Ma'lumotlar":"Данные","Profil rasmi":"Фото профиля",

  "Hammasi joyida":"Всё в порядке","Kritik kislorod":"Критический кислород","Past kislorod":"Низкий кислород",

  "Kun":"День","Hafta":"Неделя","Oy":"Месяц","3 oy":"3 мес.","Yil":"Год","1 soat":"1 час","6 soat":"6 час.","24 soat":"24 часа",

};
function ruPhrase(text){ const k=text.trim(); if(k && RU[k]!==undefined) return text.replace(k,RU[k]); return text; }
function walkText(root,fn){ if(!root) return; const w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,null); const a=[]; let n; while(n=w.nextNode())a.push(n); a.forEach(fn); }
function applyLang(){ const lang=getLang();
  ['s-auth','s-register','s-lock','s-main'].forEach(id=>{ const el=document.getElementById(id); if(!el) return;
    walkText(el, t=>{ if(t._orig===undefined) t._orig=t.nodeValue; const src=t._orig; if(!src.trim()) return;
      t.nodeValue = lang==='uz-cyrillic'? translitWords(src) : lang==='ru'? ruPhrase(src) : src; }); }); }

/* ===== SHAXSIY MA'LUMOTLAR ===== */
function renderPersonal(){ const photos=USER.photos||[]; const idx=USER.photoIdx||0;
  document.getElementById('content').innerHTML=`
  <div style="text-align:center;padding:8px 0 4px">
    <div class="avatar-edit" onclick="pickPhoto()">
      ${activePhoto()?`<img src="${activePhoto()}">`:`<div class="ph">${(USER.ism[0]+USER.fam[0]).toUpperCase()}</div>`}
      <div class="cam">📷</div>
    </div>
    <div style="font-size:12px;color:var(--ink-soft)">Rasm qo'shish / o'zgartirish</div>
  </div>
  <div class="sec-h">Profil rasmlari (${photos.length}/10)</div>
  <div class="photo-grid">
    ${photos.map((p,i)=>`<div class="photo-th ${i===idx?'on':''}">
      <img src="${p}" onclick="setActivePhoto(${i})">
      <div class="rm" onclick="removePhoto(${i})">×</div>
      ${i===idx?'<div class="badge">✓</div>':''}</div>`).join('')}
    ${photos.length<10?`<div class="photo-add" onclick="pickPhoto()">＋</div>`:''}
  </div>
  ${photos.length?`<div class="hint" style="margin-top:8px">Rasm ustiga bossangiz — asosiy (profil) rasmi bo'ladi. × bilan o'chiriladi.</div>`:''}
  <div class="sec-h">Ma'lumotlar</div>
  <div class="card">
    <div class="row2">
      <div class="field"><label>Ism</label><input id="p-ism" value="${esc(USER.ism)}"></div>
      <div class="field"><label>Familiya</label><input id="p-fam" value="${esc(USER.fam)}"></div></div>
    <div class="field"><label>Telefon raqam</label><input id="p-tel" type="tel" inputmode="tel" value="${USER.phone?esc(USER.phone):''}" placeholder="+998 90 123 45 67"></div>
    <div class="row2">
      <div class="field" style="margin-bottom:0"><label>Viloyat</label><input id="p-vil" value="${esc(USER.vil)}"></div>
      <div class="field" style="margin-bottom:0"><label>Tuman</label><input id="p-tum" value="${esc(USER.tum)}"></div></div>
  </div>
  <button class="btn" style="margin-top:16px" onclick="savePersonal()">Saqlash</button>`; }
function savePersonal(){ const ism=val('p-ism'),fam=val('p-fam'); if(!ism||!fam){toast('Ism va familiya bo\'sh bo\'lmasin');return;}
  USER.ism=ism; USER.fam=fam; USER.phone=val('p-tel'); USER.vil=val('p-vil'); USER.tum=val('p-tum');
  dbSet('user',USER); toast('Saqlandi'); history.back(); }
function pickPhoto(){ if((USER.photos||[]).length>=10){ toast('Maksimum 10 ta rasm'); return; }
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=e=>{ const f=e.target.files[0]; if(!f) return; const rd=new FileReader();
    rd.onload=()=>resizeImg(rd.result,256,d=>{ USER.photos=USER.photos||[]; USER.photos.push(d); USER.photoIdx=USER.photos.length-1;
      dbSet('user',USER); renderPersonal(); applyLang(); toast('Rasm qo\'shildi'); });
    rd.readAsDataURL(f); }; inp.click(); }
function setActivePhoto(i){ USER.photoIdx=i; dbSet('user',USER); renderPersonal(); applyLang(); toast('Asosiy rasm o\'zgardi'); }
function removePhoto(i){ USER.photos.splice(i,1); if((USER.photoIdx||0)>=USER.photos.length) USER.photoIdx=Math.max(0,USER.photos.length-1);
  dbSet('user',USER); renderPersonal(); applyLang(); toast('Rasm o\'chirildi'); }
function resizeImg(src,size,cb){ const img=new Image(); img.onload=()=>{ const c=document.createElement('canvas');
  c.width=size;c.height=size; const x=c.getContext('2d'); const m=Math.min(img.width,img.height);
  x.drawImage(img,(img.width-m)/2,(img.height-m)/2,m,m,0,0,size,size); cb(c.toDataURL('image/jpeg',0.85)); }; img.src=src; }

/* ===== PIN ===== */
function getPin(){ return dbGet('pin'); }
function renderPin(){ const has=!!getPin(); document.getElementById('content').innerHTML=`
  <div class="sec-h">${has?'PIN kodni o\'zgartirish':'PIN kod o\'rnatish'}</div>
  <div class="card">
    ${has?`<div class="field"><label>Joriy PIN</label><input id="pin-old" class="pin-in" type="password" inputmode="numeric" maxlength="6"></div>`:''}
    <div class="field"><label>Yangi PIN (4-6 raqam)</label><input id="pin-new" class="pin-in" type="password" inputmode="numeric" maxlength="6"></div>
    <div class="field" style="margin-bottom:0"><label>Tasdiqlash</label><input id="pin-conf" class="pin-in" type="password" inputmode="numeric" maxlength="6"></div>
  </div>
  <button class="btn" style="margin-top:14px" onclick="savePin()">Saqlash</button>
  ${has?`<button class="btn ghost sm" style="margin-top:10px;color:var(--crit);border-color:#F2C9C4" onclick="removePin()">PIN'ni o'chirish</button>`:''}
  <div style="font-size:12px;color:var(--ink-faint);text-align:center;margin-top:12px;line-height:1.6">PIN o'rnatilsa, ilova har ochilganda so'raladi.</div>`; }
function savePin(){ const has=!!getPin();
  if(has && val('pin-old')!==getPin()){ toast('Joriy PIN noto‘g‘ri'); return; }
  const n=val('pin-new'), c=val('pin-conf');
  if(!/^\d{4,6}$/.test(n)){ toast('PIN 4-6 raqam bo‘lsin'); return; }
  if(n!==c){ toast('PIN mos kelmadi'); return; }
  dbSet('pin',n); toast('PIN saqlandi'); history.back(); }
function removePin(){ if(!confirm('PIN o‘chirilsinmi?')) return; localStorage.removeItem('sl_pin'); mem.pin=null; toast('PIN o‘chirildi'); history.back(); }

/* ===== HELPERS ===== */
function getLake(id){ return LAKES.find(L=>L.id===id); }
function val(id){ const e=document.getElementById(id); return e?(e.value||'').trim():''; }
function esc(s){ return (s+'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
let toastTimer; function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2200); }
