# ============================================================
#  SmartLake — Firmware OTA Build & Deploy
#  firmware/ papkasida o'zgarish bo'lganda yoki qo'lda
#  ishga tushadi. Arduino CLI bilan .bin build qiladi va
#  Firebase Storage'ga yuklaydi.
# ============================================================

name: Firmware OTA Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'firmware/**'
  workflow_dispatch:
    inputs:
      target:
        description: 'Qaysi firmware'
        required: true
        type: choice
        options:
          - gateway
          - node
          - both
      deploy:
        description: 'Firebase ga deploy qilish'
        required: true
        type: boolean
        default: true

jobs:
  build-firmware:
    name: Build Firmware
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        include:
          - name: gateway
            sketch: firmware/aqua_gateway_firebase_v32_5.ino
            board: esp32:esp32:esp32
          - name: node
            sketch: firmware/aqua_node_lora_v16_2_sync.ino
            board: esp32:esp32:esp32

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip check
        id: skip
        run: |
          TARGET="${{ github.event.inputs.target || 'both' }}"
          if [ "$TARGET" != "both" ] && [ "$TARGET" != "${{ matrix.name }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Arduino CLI
        if: steps.skip.outputs.skip != 'true'
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 core & libraries
        if: steps.skip.outputs.skip != 'true'
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          arduino-cli lib install "RadioLib"
          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install "WiFiManager"
          arduino-cli lib install "LiquidCrystal I2C"
          # Firebase lib (manual install)
          git clone https://github.com/mobizt/Firebase-ESP-Client.git ~/Arduino/libraries/Firebase_ESP_Client

      - name: Compile ${{ matrix.name }}
        if: steps.skip.outputs.skip != 'true'
        run: |
          arduino-cli compile \
            --fqbn ${{ matrix.board }} \
            --build-property "build.partitions=min_spiffs" \
            --output-dir build/${{ matrix.name }} \
            ${{ matrix.sketch }}

      - name: Generate SHA256
        if: steps.skip.outputs.skip != 'true'
        run: |
          BIN=$(find build/${{ matrix.name }} -name "*.bin" | head -1)
          sha256sum "$BIN" | awk '{print $1}' > build/${{ matrix.name }}/sha256.txt
          echo "SHA256: $(cat build/${{ matrix.name }}/sha256.txt)"
          echo "bin_path=$BIN" >> $GITHUB_ENV

      - name: Upload build artifact
        if: steps.skip.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.name }}
          path: build/${{ matrix.name }}/
          retention-days: 30

  deploy-firebase:
    name: Deploy to Firebase
    needs: build-firmware
    if: ${{ github.event.inputs.deploy != 'false' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download gateway artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware-gateway
          path: build/gateway/
        continue-on-error: true

      - name: Download node artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware-node
          path: build/node/
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Firebase tools
        run: npm install -g firebase-tools

      - name: Deploy firmware to Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_PROJECT: ${{ secrets.FIREBASE_PROJECT || 'smartlake-6ce23' }}
        run: |
          # Gateway .bin yuklash
          GW_BIN=$(find build/gateway/ -name "*.bin" 2>/dev/null | head -1)
          if [ -n "$GW_BIN" ]; then
            GW_VER=$(echo "$GW_BIN" | grep -oP '\d+\.\d+' || echo "$(date +%Y%m%d)")
            echo "Gateway firmware: $GW_BIN (v$GW_VER)"

            # Firebase Storage'ga yuklash
            firebase storage:upload "$GW_BIN" "firmware/gateway/v${GW_VER}/firmware.bin" \
              --project "$FIREBASE_PROJECT" --token "$FIREBASE_TOKEN" || true

            # RTDB'ga versiya yozish (firebase CLI orqali)
            # Bu qism admin paneldan qo'lda ham qilish mumkin
            echo "Gateway v$GW_VER Firebase Storage'ga yuklandi"
          fi

          # Node .bin yuklash
          NODE_BIN=$(find build/node/ -name "*.bin" 2>/dev/null | head -1)
          if [ -n "$NODE_BIN" ]; then
            NODE_VER=$(echo "$NODE_BIN" | grep -oP '\d+\.\d+' || echo "$(date +%Y%m%d)")
            echo "Node firmware: $NODE_BIN (v$NODE_VER)"

            firebase storage:upload "$NODE_BIN" "firmware/node/v${NODE_VER}/firmware.bin" \
              --project "$FIREBASE_PROJECT" --token "$FIREBASE_TOKEN" || true

            echo "Node v$NODE_VER Firebase Storage'ga yuklandi"
          fi

          echo "✓ Firmware deploy tugadi"
