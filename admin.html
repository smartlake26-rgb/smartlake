<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Lake — Admin panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F1F5F4; --surface:#FFFFFF; --ink:#10302B; --ink-soft:#5E736E; --ink-faint:#90A29E;
    --side:#0B2C28; --side-2:#123F38; --side-ink:#CFE3DE; --side-active:#15AEC2;
    --primary:#0E7C6B; --primary-d:#0A5C50; --aqua:#15AEC2;
    --good:#1E9E6A; --warn:#E0922F; --carrot:#E2660A; --crit:#DC4B3E;
    --line:#E2EAE8; --line-2:#EDF2F0;
    --sans:"Sora",-apple-system,"Segoe UI",Roboto,system-ui,sans-serif;
    --mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{font-family:var(--sans); background:var(--bg); color:var(--ink); font-size:14px; -webkit-font-smoothing:antialiased;}
  button,input,select,textarea{font-family:inherit;}
  /* ---------- LOGIN ---------- */
  #login{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(90% 70% at 12% 6%, rgba(31,192,214,.40) 0%, rgba(31,192,214,0) 55%),
      radial-gradient(110% 80% at 96% 100%, rgba(21,174,194,.32) 0%, rgba(21,174,194,0) 60%),
      linear-gradient(150deg,#0B2C28 0%,#0E7C6B 100%);
    padding:20px; z-index:50; overflow:hidden;}
  .login-card{ background:#fff; width:380px; max-width:100%; border-radius:18px; padding:30px 30px 26px; box-shadow:0 24px 70px rgba(0,0,0,.34); position:relative; z-index:1;}
  /* kirish yashil fonida oqar to'lqin */
  #login::before{ content:""; position:absolute; inset:0; z-index:0; pointer-events:none;
    background:url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPScxMjAnIGhlaWdodD0nMjInIHZpZXdCb3g9JzAgMCAxMjAgMjInPjxwYXRoIGQ9J00wIDExIHEzMCAtNiA2MCAwIHQ2MCAwJyBmaWxsPSdub25lJyBzdHJva2U9JyNmZmZmZmYnIHN0cm9rZS13aWR0aD0nMS42Jy8+PC9zdmc+") repeat; background-size:120px 22px; opacity:.14;
    animation:slWave 11s linear infinite; }
  #login::after{ content:""; position:absolute; left:0; right:0; bottom:0; height:80px; z-index:0; pointer-events:none;
    background:url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPScxMjAnIGhlaWdodD0nMTQnIHZpZXdCb3g9JzAgMCAxMjAgMTQnPjxwYXRoIGQ9J00wIDggcTMwIC02IDYwIDAgdDYwIDAnIGZpbGw9J25vbmUnIHN0cm9rZT0nI2ZmZmZmZicgc3Ryb2tlLXdpZHRoPScyLjQnIHN0cm9rZS1saW5lY2FwPSdyb3VuZCcvPjwvc3ZnPg==") repeat-x; background-size:120px 14px; background-position:0 60px; opacity:.4;
    animation:slWave 7s linear infinite reverse; }
  @keyframes slWave{ to{ background-position-x:-120px; } }
  .login-card img{ width:84px; display:block; margin:0 auto 10px;}
  .login-card .sub{ text-align:center; color:var(--ink-soft); font-size:13px; margin-bottom:22px;}
  .demo{ background:var(--bg); border:1px dashed var(--line); border-radius:10px; padding:10px 12px; font-size:12px; color:var(--ink-soft); margin-top:14px; line-height:1.7;}
  .demo b{ color:var(--ink); font-family:var(--mono);}
  /* ---------- APP SHELL ---------- */
  #app{ display:none; grid-template-columns:248px 1fr; min-height:100vh;}
  .sidebar{ background:var(--side); color:var(--side-ink); display:flex; flex-direction:column; padding:18px 14px; position:sticky; top:0; height:100vh;}
  .brand{ display:flex; align-items:center; gap:10px; padding:4px 8px 18px; border-bottom:1px solid rgba(255,255,255,.08); margin-bottom:12px;}
  .brand img{ width:36px;}
  .brand .nm{ font-weight:700; font-size:16px; color:#fff; line-height:1;}
  .brand .nm span{ color:var(--aqua);}
  .brand .tg{ font-size:10px; color:var(--side-ink); opacity:.7; letter-spacing:1px;}
  .nav{ flex:1; overflow-y:auto; margin:0 -4px;}
  .nav button{ width:100%; text-align:left; background:none; border:none; color:var(--side-ink); padding:10px 12px; border-radius:9px;
    display:flex; align-items:center; gap:11px; font-size:13.5px; font-weight:500; cursor:pointer; margin-bottom:2px;}
  .nav button:hover{ background:var(--side-2);}
  .nav button.on{ background:var(--side-active); color:#fff; font-weight:600;}
  .nav button .ic{ font-size:16px; width:20px; text-align:center; line-height:0;}
  .nav button .ic svg{ vertical-align:middle;}
  .nav button .badge{ margin-left:auto; background:var(--crit); color:#fff; font-size:10px; font-weight:700; border-radius:9px; padding:1px 6px;}
  .side-user{ border-top:1px solid rgba(255,255,255,.08); padding-top:12px; font-size:12.5px;}
  .side-user .nm{ color:#fff; font-weight:600;}
  .side-user .role{ color:var(--side-ink); opacity:.75;}
  .side-user button{ margin-top:10px; width:100%; background:var(--side-2); color:#fff; border:none; border-radius:8px; padding:9px; font-size:12.5px; cursor:pointer;}
  /* ---------- MAIN ---------- */
  .main{ display:flex; flex-direction:column; min-width:0;}
  .topbar{ background:var(--surface); border-bottom:1px solid var(--line); padding:14px 26px; display:flex; align-items:center; gap:16px; position:sticky; top:0; z-index:10;}
  .topbar h1{ font-size:19px; font-weight:600; margin:0; flex:1;}
  .topbar .who{ font-size:12.5px; color:var(--ink-soft);}
  .topbar .who b{ color:var(--ink);}
  .content{ padding:24px 26px; max-width:1200px; width:100%;}
  /* ---------- COMPONENTS ---------- */
  .cards{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:22px;}
  .stat{ background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:16px 18px;}
  .stat .n{ font-family:var(--mono); font-weight:700; font-size:26px;}
  .stat .l{ font-size:12.5px; color:var(--ink-soft); margin-top:2px;}
  .panel{ background:var(--surface); border:1px solid var(--line); border-radius:14px; overflow:hidden; margin-bottom:22px;}
  .panel-h{ padding:14px 18px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:12px;}
  .panel-h h2{ font-size:15px; margin:0; font-weight:600; flex:1;}
  .panel-b{ padding:6px 0;}
  table{ width:100%; border-collapse:collapse; font-size:13px;}
  th{ text-align:left; padding:11px 18px; color:var(--ink-faint); font-weight:600; font-size:11.5px; text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--line);}
  td{ padding:12px 18px; border-bottom:1px solid var(--line-2); vertical-align:middle;}
  tr:last-child td{ border-bottom:none;}
  tr:hover td{ background:#FAFCFB;}
  .mono{ font-family:var(--mono);}
  .pill{ display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600; padding:3px 9px; border-radius:20px; white-space:nowrap;}
  .p-good{ background:#E2F3EB; color:#0F6E47;} .p-warn{ background:#FBEFDC; color:#9A5E12;}
  .p-carrot{ background:#FBE7D6; color:#A0490B;} .p-crit{ background:#FBE3E0; color:#A12C22;}
  .p-on{ background:#DBF4F8; color:#0B6B79;} .p-off{ background:#EDF2F0; color:#5E736E;}
  .p-blue{ background:#E7F0FB; color:#1A5DA8;} .p-grey{ background:#EEF2F0; color:#5E736E;}
  .btn{ border:none; border-radius:9px; padding:9px 15px; font-weight:600; font-size:13px; cursor:pointer; background:var(--primary); color:#fff;}
  .btn:hover{ background:var(--primary-d);}
  .btn.sm{ padding:6px 11px; font-size:12px;}
  .btn.ghost{ background:var(--surface); color:var(--primary); border:1.5px solid var(--line);}
  .btn.danger{ background:#FBE3E0; color:#A12C22;}
  .btn.mini{ padding:5px 9px; font-size:11.5px; border-radius:7px; background:var(--bg); color:var(--ink-soft); border:1px solid var(--line);}
  .btn.mini:hover{ background:#fff; color:var(--ink);}
  .field{ margin-bottom:14px;}
  .field label{ display:block; font-size:12.5px; color:var(--ink-soft); margin-bottom:5px; font-weight:500;}
  .field input, .field select, .field textarea{ width:100%; padding:10px 12px; border:1.5px solid var(--line); border-radius:9px; font-size:13.5px; outline:none; background:#fff;}
  .field input:focus,.field select:focus,.field textarea:focus{ border-color:var(--primary);}
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .row3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px;}
  .toolbar{ display:flex; gap:10px; align-items:center; margin-bottom:16px; flex-wrap:wrap;}
  .toolbar input,.toolbar select{ padding:9px 12px; border:1.5px solid var(--line); border-radius:9px; font-size:13px; outline:none;}
  .toolbar .grow{ flex:1;}
  .empty{ text-align:center; padding:40px; color:var(--ink-soft);}
  /* modal */
  .modal-bg{ position:fixed; inset:0; background:rgba(11,44,40,.45); display:flex; align-items:center; justify-content:center; z-index:60; padding:20px;}
  .modal{ background:#fff; border-radius:16px; width:560px; max-width:100%; max-height:88vh; overflow-y:auto; box-shadow:0 24px 70px rgba(0,0,0,.3);}
  .modal-h{ padding:18px 22px; border-bottom:1px solid var(--line); display:flex; align-items:center;}
  .modal-h h3{ margin:0; font-size:16px; flex:1;}
  .modal-h .x{ cursor:pointer; font-size:22px; color:var(--ink-faint); line-height:1;}
  .modal-b{ padding:20px 22px;}
  .modal-f{ padding:14px 22px; border-top:1px solid var(--line); display:flex; gap:10px; justify-content:flex-end;}
  .toast{ position:fixed; bottom:24px; right:24px; background:var(--ink); color:#fff; padding:12px 18px; border-radius:10px; font-size:13.5px; z-index:80; opacity:0; transform:translateY(10px); transition:.25s; box-shadow:0 10px 30px rgba(0,0,0,.25);}
  .toast.show{ opacity:1; transform:none;}
  .grid-tbl{ width:100%; border-collapse:collapse; font-size:12px;}
  .grid-tbl th,.grid-tbl td{ border:1px solid var(--line); padding:5px; text-align:center;}
  .grid-tbl input{ width:54px; padding:5px; border:1px solid var(--line); border-radius:6px; text-align:center; font-size:12px; font-family:var(--mono);}
  .grid-tbl .tw{ width:90px;}
  .bar-row{ display:flex; align-items:center; gap:12px; margin-bottom:10px; font-size:12.5px;}
  .bar-row .lab{ width:130px; color:var(--ink-soft);}
  .bar-row .track{ flex:1; background:var(--line-2); border-radius:8px; height:16px; overflow:hidden;}
  .bar-row .fill{ height:100%; background:linear-gradient(90deg,var(--primary),var(--aqua)); border-radius:8px;}
  .bar-row .val{ width:70px; text-align:right; font-family:var(--mono); font-weight:700;}
  .tag{ display:inline-block; font-size:11px; background:var(--bg); border:1px solid var(--line); border-radius:6px; padding:2px 7px; color:var(--ink-soft);}
  .ranges{ display:flex; gap:6px; flex-wrap:wrap;}
  .ranges button{ background:var(--bg); border:1px solid var(--line); color:var(--ink-soft); border-radius:8px; padding:6px 13px; font-size:12.5px; cursor:pointer; font-weight:600;}
  .ranges button.on{ background:var(--primary); color:#fff; border-color:var(--primary);}
  canvas#achart{ width:100%; height:300px; display:block; cursor:crosshair; touch-action:none;}
  .readout{ font-family:var(--mono); font-size:13px; margin-top:12px; display:flex; gap:16px; flex-wrap:wrap; align-items:center; font-weight:700;}
  .readout .tm{ color:var(--ink-soft); font-weight:500;}
  .kvr{ display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--line-2); font-size:13.5px;}
  .kvr:last-child{ border-bottom:none;}
  .kvr .k{ color:var(--ink-soft);} .kvr .v{ font-weight:600;} .kvr .v.big{ font-family:var(--mono); font-size:16px;}
  @media(max-width:820px){ #app{grid-template-columns:1fr;} .sidebar{position:fixed; left:-260px;} }
</style>
</head>

<!-- Firebase (fermer ilovasi bilan AYNAN bir xil real-time ma'lumot) -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
/* ============ STORAGE ============ */
const mem={};
function dbGet(k){ try{const v=localStorage.getItem('sla_'+k); if(v!==null) return JSON.parse(v);}catch(e){} return mem[k]??null; }
function dbSet(k,v){ mem[k]=v; try{localStorage.setItem('sla_'+k,JSON.stringify(v));}catch(e){} }

/* ============ FIREBASE — JONLI MA'LUMOT (fermer ilovasi bilan bir xil baza) ============ */
let fbDb=null, fbAuth=null, fbReady=false; const LIVE={}, LIVE_GW={};
let REQS={};            // /requests — fermerlardan kelgan ko'l tasdiq so'rovlari
let FB_USERS={};         // /users — ro'yxatdan o'tgan real fermerlar (akkauntlar)
let ADMIN_ROLES={};      // /adminRoles — super admin bergan rollar (email bo'yicha)
let REGISTRY={};         // /registry — tasdiqlangan ko'llar (chip -> {approved,lake,farmer,region})
const LIVE_FRESH_MS=15*60*1000;
function fbInit(){
  try{
    if(typeof firebase==='undefined' || typeof FIREBASE_CONFIG==='undefined'){ fbBadge(false); return; }
    if(!FIREBASE_CONFIG.databaseURL || String(FIREBASE_CONFIG.apiKey||'').indexOf('XXXX')>=0){ fbBadge(false); return; }
    firebase.initializeApp(FIREBASE_CONFIG);
    fbDb=firebase.database();
    fbAuth=firebase.auth();
    fbAuth.onAuthStateChanged(handleAdminAuth);

  CUR={ email:e, name:(e.split('@')[0]||'admin'), role:info.role, region:info.region||'', regions:(info.regions&&info.regions.length?info.regions:(info.region?[info.region]:[])) };
  dbSet('adminEmail', e);
  enterAdmin();
}
function doLogin(){
  const email=v('lg-user').trim().toLowerCase(), pass=v('lg-pass');
  const errEl=document.getElementById('lg-err');
  errEl.style.color='var(--crit)';
  if(!email||!pass){ errEl.textContent='Email va parolni kiriting'; return; }
  if(!fbAuth){ errEl.textContent='Firebase ulanmagan'; return; }
  errEl.style.color='var(--ink-soft)'; errEl.textContent='Kirilmoqda...';
  fbAuth.signInWithEmailAndPassword(email, pass)
    .then(()=>{ errEl.textContent=''; audit('Tizimga kirdi: '+email); /* handleAdminAuth rolni tekshirib kiritadi */ })
    .catch(e=>{ errEl.style.color='var(--crit)'; errEl.textContent=adminAuthErr(e); });
}
function enterAdmin(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='grid';
  document.getElementById('su-name').textContent=CUR.name;
  document.getElementById('su-role').textContent=ROLES[CUR.role]+((CUR.regions&&CUR.regions.length)?(' · '+CUR.regions.join(', ')):(CUR.region?(' · '+CUR.region):''));
  document.getElementById('tb-name').textContent=CUR.name+' ('+ROLES[CUR.role]+')';
  buildNav();
  const first=SECTIONS.find(s=>can(s.id)); go(first?first.id:'devices');
}
function adminLogout(){ CUR=null; _adminListenersOn=false;
  if(fbAuth){ try{ fbAuth.signOut(); }catch(e){} }
  document.getElementById('app').style.display='none';
  document.getElementById('login').style.display='flex';
  v2('lg-user',''); v2('lg-pass',''); document.getElementById('lg-err').textContent=''; }
function forgotPass(){
  const email=v('lg-user').trim().toLowerCase();
  const errEl=document.getElementById('lg-err');
  if(!email){ errEl.style.color='var(--crit)'; errEl.textContent='Avval email kiriting, keyin "Parolni unutdingizmi?" bosing'; return; }
  if(typeof firebase==='undefined' || !firebase.auth){ errEl.style.color='var(--crit)'; errEl.textContent='Firebase ulanmagan'; return; }
  errEl.style.color='var(--ink-soft)'; errEl.textContent='Yuborilmoqda...';
  firebase.auth().sendPasswordResetEmail(email)
    .then(()=>{ errEl.style.color='var(--good)'; errEl.textContent='Parolni tiklash havolasi '+email+' ga yuborildi. Pochtangizni tekshiring.'; })
    .catch(e=>{ errEl.style.color='var(--crit)'; errEl.textContent=adminAuthErr(e); });
}
/* ============ NAV / ROUTER ============ */
function buildNav(){ const nav=document.getElementById('nav');
  const pend=(dbGet('approvals')||[]).filter(a=>a.status==='pending').length + (fbReady?fbLiveRequests().filter(r=>CUR.role!=='region'||inMyRegion(r.region||'')).length:0);
  const al=getAlerts().filter(a=>!a.ack).length;
  const gwOff=(dbGet('gateways')||[]).filter(g=>!g.online && (CUR.role!=='region'||inMyRegion(g.region))).length;
  nav.innerHTML=SECTIONS.filter(s=>can(s.id)).map(s=>{
    let b=''; if(s.id==='approvals'&&pend) b=`<span class="badge">${pend}</span>`;
    if(s.id==='alerts'&&al) b=`<span class="badge">${al}</span>`;
    if(s.id==='gateways'&&gwOff) b=`<span class="badge">${gwOff}</span>`;
    return `<button id="nav-${s.id}" onclick="go('${s.id}')"><span class="ic">${icon(s.ic,18)}</span>${s.name}${b}</button>`; }).join('');
}
function go(id){ if(!can(id)) return; page=id;
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('on'));
  const nb=document.getElementById('nav-'+id); if(nb) nb.classList.add('on');
  document.getElementById('page-title').textContent=(SECTIONS.find(s=>s.id===id)||{}).name||'';
  const R={devices:renderDevices,gateways:renderGateways,approvals:renderApprovals,users:renderUsers,feeds:renderFeeds,alerts:renderAlerts,
    analytics:renderAnalytics,ai:renderAI,announce:renderAnnounce,billing:renderBilling,support:renderSupport,audit:renderAudit,settings:renderSettings};
  (R[id]||(()=>{}))();
}

/* ============ QURILMALAR ============ */
let devFilter={q:'',gw:'',status:''};
function renderDevices(){
  let d=dbGet('devices')||[]; const farmers=dbGet('farmers')||[]; const gws=dbGet('gateways')||[];
  if(CUR.role==='region') d=d.filter(x=>{ const eff=x.region||((regForChip(x.chipId)||{}).region)||((reqForChip(x.chipId)||{}).region)||''; return inMyRegion(eff); });
  const f=d.filter(x=> (!devFilter.q || (x.chipId+x.lake).toLowerCase().includes(devFilter.q.toLowerCase()))
    && (!devFilter.gw||x.gwId===devFilter.gw) && (!devFilter.status||x.status===devFilter.status));
  const fname=id=>{ const fr=farmers.find(y=>y.id===id); return fr?fr.ism+' '+fr.fam:'—'; };
  const onl=d.filter(x=>x.status==='active'); const rs=onl.filter(x=>x.rssi!=null);
  const avgRssi= rs.length? Math.round(rs.reduce((a,x)=>a+x.rssi,0)/rs.length)+' dBm':'—';
  const gwCount=new Set(d.map(x=>x.gwId).filter(Boolean)).size;
  C().innerHTML=`
    ${stats([['Jami',d.length],['Onlayn',onl.length],['Oflayn',d.filter(x=>x.status==='offline').length],['Shlyuzlar',gwCount],['O\'rtacha RSSI',avgRssi]])}
    <div class="toolbar">
      <input class="grow" placeholder="Chip ID yoki ko'l bo'yicha qidirish" oninput="devFilter.q=this.value;renderDevices()" value="${devFilter.q}">
      <select onchange="devFilter.gw=this.value;renderDevices()"><option value="">Shlyuz: barchasi</option>${gws.map(g=>`<option value="${g.id}"${sel(devFilter.gw,g.id)}>${g.id} · ${esc(g.region)}</option>`).join('')}</select>
      <select onchange="devFilter.status=this.value;renderDevices()"><option value="">Holat: barchasi</option><option value="active"${sel(devFilter.status,'active')}>Onlayn</option><option value="offline"${sel(devFilter.status,'offline')}>Oflayn</option><option value="blocked"${sel(devFilter.status,'blocked')}>Bloklangan</option></select>
      ${CUR.role!=='region'?'<button class="btn" onclick="deviceAdd()">+ Qurilma</button>':''}
    </div>
    <div class="panel"><table><thead><tr><th>Chip ID</th><th>Ko'l / Fermer</th><th>Shlyuz</th><th>RSSI / SNR</th><th>DO</th><th>Oxirgi</th><th>Holat</th><th></th></tr></thead><tbody>
    ${f.length?f.map(x=>{ const reg=x.farmerId?null:regForChip(x.chipId); const rq=(x.farmerId||reg)?null:reqForChip(x.chipId); const _lake=x.farmerId?x.lake:((reg&&reg.lake)||(rq&&rq.lake)||x.lake); const _farmer=x.farmerId?fname(x.farmerId):((reg&&reg.farmer)||(rq&&rq.farmer)||''); const _pending=!x.farmerId&&!reg&&!!rq; return `<tr>
      <td class="mono">${x.chipId}<div style="font-size:11px;color:var(--ink-faint)">${x.fw||'—'}</div></td>
      <td>${esc(_lake)}<div style="font-size:11px;color:var(--ink-soft)">${_farmer?esc(_farmer):'<span style="color:var(--ink-faint)">—</span>'}${_pending?' <span style="color:var(--warn)">· kutilmoqda</span>':''}</div></td>
      <td><span class="pill p-blue">${x.gwId||'—'}</span></td>
      <td class="mono">${x.rssi!=null?(x.rssi+' dBm'):'—'}<div style="font-size:11px;color:var(--ink-faint)">${x.snr!=null?('SNR '+x.snr+' dB'):''}</div></td>
      <td class="mono">${x.do?x.do:'—'}</td>
      <td style="font-size:12px;color:var(--ink-soft)">${ago(x.lastSeen)}</td>
      <td>${devStatusPill(x.status)}</td>
      <td style="text-align:right;white-space:nowrap">
        ${!x.farmerId?`<button class="btn mini" style="background:#E2F3EB;color:#0F6E47" onclick="assignDevice('${x.chipId}')">Biriktirish</button>`:''}
        <button class="btn mini" onclick="devConfig('${x.chipId}')">Sozlash</button>
        <button class="btn mini" onclick="devCmd('${x.chipId}')">Buyruq</button>
        <button class="btn mini" onclick="devBlock('${x.chipId}')">${x.status==='blocked'?'Faollashtirish':'Bloklash'}</button>
      </td></tr>`; }).join(''):`<tr><td colspan="8"><div class="empty">Qurilma topilmadi</div></td></tr>`}
    </tbody></table></div>`;
}
function devStatusPill(s){ return s==='active'?'<span class="pill p-good">Onlayn</span>':s==='offline'?'<span class="pill p-grey">Oflayn</span>':'<span class="pill p-crit">Bloklangan</span>'; }

function gwConfig(id){ const g=(dbGet('gateways')||[]).find(x=>x.id===id); if(!g) return;
  modal('Shlyuzni sozlash — '+id, `

function gwToggle(id){ const list=dbGet('gateways')||[]; const g=list.find(x=>x.id===id); if(!g) return;
  g.online=!g.online; g.lastSeen=Date.now();
  /* Shlyuz holati ulangan tugunlarning onlayn/oflayn holatiga ta'sir qiladi */
  const devs=dbGet('devices')||[];
  devs.forEach(d=>{ if(d.gwId===id && d.status!=='blocked'){ if(!g.online){ d.status='offline'; d.rssi=null; d.snr=null; }
    else if(d.status==='offline'){ d.status='active'; d.rssi=-(70+Math.floor(Math.random()*35)); d.snr=+(4+Math.random()*7).toFixed(1); } } });
  dbSet('gateways',list); dbSet('devices',devs);
  audit('Shlyuz '+(g.online?'onlayn':'oflayn')+': '+id); renderGateways(); buildNav(); }

function assignDevice(id){

  const req = fbReady ? fbLiveRequests().find(r=>String(r.chip||'').toUpperCase()===String(id).toUpperCase()) : null;
  if(req){
    bindFromRequest(req);

}

/* === Fermer SO'ROVIDAN admin paneliga yozish — ko'l nomi DOIM fermer yozgani === */
function bindFromRequest(r){
  if(!r || !r.chip) return null;
  const chip=String(r.chip).toUpperCase(), lakeName=(r.lake||chip), region=(r.region||'');
  /* Fermer (admin dashboard uchun) — uid yoki ism+telefon bo'yicha topiladi, bo'lmasa yaratiladi */
  const farmers=dbGet('farmers')||[];
  let fr = (r.uid && farmers.find(f=>f.uid===r.uid))
        || farmers.find(f=>((f.ism+' '+f.fam).trim().toLowerCase()===String(r.farmer||'').trim().toLowerCase()) && (f.phone||'')===(r.phone||''));
  if(!fr){
    const parts=String(r.farmer||'Fermer').trim().split(/\s+/);
    fr={id:rid('F'), uid:r.uid||'', ism:parts[0]||'Fermer', fam:parts.slice(1).join(' '), region:region, tuman:'', phone:r.phone||'', status:'active', joined:Date.now()};
    farmers.push(fr); dbSet('farmers',farmers);
  } else if(r.uid && !fr.uid){ fr.uid=r.uid; dbSet('farmers',farmers); }
  /* Qurilma — bor bo'lsa biriktiriladi, yo'q bo'lsa yaratiladi */
  const devices=dbGet('devices')||[];
  let d=devices.find(x=>String(x.chipId).toUpperCase()===chip);
  if(d){ d.farmerId=fr.id; d.lake=lakeName; if(region) d.region=region; d.status='active'; }
  else { d=makeDevice(chip, fr.id, lakeName, region); d.real=true; devices.unshift(d); }
  dbSet('devices',devices);
  /* Ko'l — id = qurilma chip, nom = FERMER yozgani */
  const lakes=dbGet('lakes')||[];
  let lk=lakes.find(l=>String(l.id).toUpperCase()===chip);
  if(lk){ lk.name=lakeName; lk.farmerId=fr.id; if(region) lk.region=region; }
  else lakes.push({id:chip, name:lakeName, farmerId:fr.id, region:region});
  dbSet('lakes',lakes);
  return fr;
}
function approveLive(key){ const r=REQS[key]||{};
  bindFromRequest(r);                 /* admin paneliga fermer nomi bilan yoziladi (chalkashmaydi) */
  fbApproveReq(key);                  /* /registry/<chip>/approved=true -> fermer ilovasi ochiladi */
  audit('Ko\'l tasdiqlandi: '+(r.chip||'')+' ('+(r.lake||'')+')');
  toast('Tasdiqlandi — fermer ilovasi ochildi'); renderApprovals(); buildNav(); }
function rejectLive(key){ const r=REQS[key]||{}; if(!confirm('So\'rov rad etilsinmi? '+(r.chip||''))) return; fbRejectReq(key); audit('Ko\'l so\'rovi rad etildi: '+(r.chip||'')); toast('Rad etildi'); renderApprovals(); buildNav(); }
function approve(id,ok){ const a=dbGet('approvals')||[]; const x=a.find(y=>y.id===id); if(!x) return;
  x.status=ok?'approved':'rejected'; dbSet('approvals',a);
  if(ok){
    const farmers=dbGet('farmers')||[];
    let fr=farmers.find(f=>(f.ism+' '+f.fam).trim().toLowerCase()===x.farmer.trim().toLowerCase());
    if(!fr){ const parts=x.farmer.trim().split(/\s+/);
      fr={id:rid('F'), ism:parts[0]||x.farmer, fam:parts.slice(1).join(' '), region:x.region, tuman:'Markaz', phone:x.phone||'+998900000000', status:'active', joined:Date.now()};
      farmers.push(fr); dbSet('farmers',farmers); }
    const devices=dbGet('devices')||[];
    if(!devices.some(d=>d.chipId===x.chip)){ devices.unshift(makeDevice(x.chip, fr.id, x.lake, x.region)); dbSet('devices',devices); }
    const lakes=dbGet('lakes')||[]; if(!lakes.some(l=>l.id===x.chip)){ lakes.push({id:x.chip,name:x.lake,farmerId:fr.id,region:x.region}); dbSet('lakes',lakes); }
    audit('Ko\'l tasdiqlandi → fermer + qurilma yaratildi: '+x.farmer+' ('+x.phone+') / '+x.chip);
    toast('Tasdiqlandi — Foydalanuvchilar va Qurilmalarga qo\'shildi');
  } else { audit('Ko\'l rad etildi: '+x.chip+' ('+x.farmer+')'); toast('Rad etildi'); }
  renderApprovals(); buildNav(); }

function feedEdit(id){ const feeds=dbGet('feeds')||[]; const ex=id?feeds.find(f=>f.id===id):null;
  const sizes=ex?ex.sizes:['20–100 g','100–300 g','300–600 g','600 g–1.2 kg','1.2–2 kg'];
  const temps=ex?ex.temps:[12,15,18,22,24,27,30,33].map(t=>({t,r:sizes.map(()=>0),times:[]}));
  const grid=`<table class="grid-tbl"><thead><tr><th>Harorat</th>${sizes.map((s,i)=>`<th><input value="${s}" id="sz-${i}" style="width:80px"></th>`).join('')}</tr></thead><tbody>
    ${temps.map((row,ri)=>`<tr><td class="tw"><input class="mono" style="width:60px" id="t-${ri}" value="${row.t}">°C</td>
      ${sizes.map((s,ci)=>`<td><input id="r-${ri}-${ci}" value="${row.r[ci]}"></td>`).join('')}</tr>`).join('')}
    </tbody></table>`;
  const timesBlock=temps.map((row,ri)=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <div class="mono" style="width:54px;color:var(--ink-soft)">${row.t}°C</div>
      <input id="tm-${ri}" style="flex:1;padding:9px 11px;border:1.5px solid var(--line);border-radius:9px;font-family:var(--mono);font-size:13px" value="${(row.times||[]).join(', ')}" placeholder="08:00, 11:00, 14:00 ... (8 tagacha)"></div>`).join('');
  modal((id?'Tahrirlash':'Yangi')+' — yem turi', `
    <div class="field"><label>Nomi</label><input id="f-name" value="${ex?esc(ex.name):''}" placeholder="masalan: AQUA FEED"></div>
    <div class="field"><label>Yem normasi jadvali (qiymatlar = tana vazniga %)</label></div>
    <div style="overflow-x:auto;margin-bottom:18px">${grid}</div>
    <div class="field"><label>Berish vaqtlari (har harorat uchun, vergul bilan, 8 tagacha)</label></div>
    ${timesBlock}`,
    [{t:'Saqlash',cls:'btn',fn:()=>{ const name=v('f-name'); if(!name){toast('Nom kiriting');return;}
      const nsizes=sizes.map((s,i)=>v('sz-'+i)||s);
      const ntemps=temps.map((row,ri)=>({ t:+v('t-'+ri)||row.t, r:nsizes.map((s,ci)=>+v('r-'+ri+'-'+ci)||0),
        times:(v('tm-'+ri)||'').split(/[\s,;]+/).map(s=>s.trim()).filter(Boolean).slice(0,8) }));
      if(ex){ Object.assign(ex,{name,sizes:nsizes,temps:ntemps}); dbSet('feeds',feeds); } else { feeds.unshift({id:rid('FD').toLowerCase(),name,active:true,sizes:nsizes,temps:ntemps}); dbSet('feeds',feeds); }
      audit('Yem turi saqlandi: '+name); toast('Saqlandi'); closeModal(); renderFeeds(); }}], 'wide');
}

function barBlock(title, pairs, unit, exportLbl){ const max=Math.max(...pairs.map(p=>p[1]),1);
  return `<div class="panel"><div class="panel-h"><h2>${title}</h2><button class="btn mini" onclick="toast('${exportLbl} (demo)')">${exportLbl}</button></div><div class="panel-b" style="padding:18px">
    ${pairs.map(([r,n])=>`<div class="bar-row"><div class="lab">${r}</div><div class="track"><div class="fill" style="width:${n/max*100}%"></div></div><div class="val">${n}${unit||''}</div></div>`).join('')}
  </div></div>`; }
function renderAnalytics(){ const dev=dbGet('devices')||[]; let farmers=dbGet('farmers')||[];
  if(CUR.role==='region'){ farmers=farmers.filter(f=>inMyRegion(f.region)); }
  const dlist=CUR.role==='region'?dev.filter(d=>inMyRegion(d.region)):dev;
  const byF={}, byD={}, byFeed={};
  farmers.forEach(f=>byF[f.region]=(byF[f.region]||0)+1);
  dlist.forEach(d=>{ byD[d.region]=(byD[d.region]||0)+1;
    const r=recForDevice(d); byFeed[d.region]=(byFeed[d.region]||0)+(r?r.kg:0); });
  const sortReg=o=>Object.entries(o).sort((a,b)=>b[1]-a[1]);
  const farmersP=sortReg(byF).slice(0,10);
  const devP=sortReg(byD).slice(0,10);
  const feedP=sortReg(byFeed).map(([r,n])=>[r,+n.toFixed(0)]).slice(0,10);
  C().innerHTML=`
    ${stats([['Fermerlar',farmers.length],['Qurilmalar',dlist.length],['Jami baliq (taxm.)',(dlist.length*1.4).toFixed(1)+' t'],['Kunlik yem (taxm.)',(feedP.reduce((s,p)=>s+p[1],0)).toFixed(0)+' kg']])}
    ${barBlock('Fermerlar soni — viloyatlar kesimida', farmersP, '', 'CSV eksport')}
    ${barBlock('Qurilmalar soni — viloyatlar kesimida', devP, '', 'CSV eksport')}
    ${barBlock('Yem sarfi (kunlik, kg) — viloyatlar kesimida', feedP, ' kg', 'PDF eksport')}`;
}

function assignRole(){

function stats(arr){ return `<div class="cards">${arr.map(([l,n])=>`<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('')}</div>`; }
function C(){ return document.getElementById('content'); }
function v(id){ const e=document.getElementById(id); return e?(e.value||''):''; }
function v2(id,val){ const e=document.getElementById(id); if(e) e.value=val; }
function sel(a,b){ return a===b?'selected':''; }
function esc(s){ return (s+'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function ago(t){ const m=Math.floor((Date.now()-t)/60000); if(m<1) return 'hozir'; if(m<60) return m+' daq oldin'; const h=Math.floor(m/60); if(h<24) return h+' soat oldin'; return Math.floor(h/24)+' kun oldin'; }
function dt(t){ const d=new Date(t); const p=n=>String(n).padStart(2,'0'); return p(d.getMonth()+1)+'-'+p(d.getDate())+'  '+p(d.getHours())+':'+p(d.getMinutes()); }
/* farmer-like yem hisobi (admin ko'rinishi uchun) */
function feedTypeById(id){ return (dbGet('feeds')||[]).find(f=>f.id===id); }
function sizeIndex(avgG){ const b=[100,300,600,1200]; for(let i=0;i<b.length;i++) if(avgG<b[i]) return i; return 4; }
function recForDevice(d){ const f=feedTypeById(d.fish&&d.fish.feedType); if(!f||!d.fish||!d.fish.count) return null;
  const ci=sizeIndex(d.fish.avgG); let best=f.temps[0],bd=1e9; f.temps.forEach(r=>{const x=Math.abs(r.t-d.temp); if(x<bd){bd=x;best=r;}});
  const massKg=d.fish.count*d.fish.avgG/1000; let kg=massKg*best.r[ci]/100, note='';
  if(d.do<2){kg=0;note='Kislorod juda past — yem bermang';} else if(d.do<4){kg*=0.5;note='Kislorod past — yarmini';}
  const times=best.times||[]; return {feedName:f.name, rate:best.r[ci], size:f.sizes[ci], massKg:+massKg.toFixed(0), kg:+kg.toFixed(1), times, perFeed:times.length?+(kg/times.length).toFixed(1):0, note}; }

/* ===== Ko'l grafigi (fermer ko'rgani kabi) ===== */
function rnd(s){ const x=Math.sin(s*9999)*10000; return x-Math.floor(x); }
function p2(n){ return ('0'+n).slice(-2); }
const APARAMS={ do:{dmin:0,dmax:12,dash:[],good:v=>v>=5,warn:v=>v>=3,label:'DO'},
  ph:{dmin:5,dmax:10,dash:[6,5],good:v=>v>=6.5&&v<=9,warn:v=>v>=6&&v<=9.5,label:'pH'},
  temp:{dmin:0,dmax:36,dash:[2,5],good:v=>v>=20&&v<=30,warn:v=>v>=14&&v<=34,label:'T'} };
function azone(p,v){ const P=APARAMS[p]; return P.good(v)?'#1E9E6A':P.warn(v)?'#E0922F':'#DC4B3E'; }
function aworse(p,a,b){ const r=v=>{const P=APARAMS[p]; return P.good(v)?0:P.warn(v)?1:2;}; return r(a)>=r(b)?a:b; }
function simAt(seed,t){ const d=new Date(t), h=d.getHours()+d.getMinutes()/60;
  const doy=(d-new Date(d.getFullYear(),0,0))/86400000; const season=Math.sin((doy-110)/365*2*Math.PI);
  const daily=Math.sin((h-6)/24*2*Math.PI);
  let temp=22+season*8+daily*2+(rnd(seed+Math.floor(t/86400000))*1.6-0.8);
  let dox=6.2-season*1.1+daily*1.5+Math.sin(t/8e6+seed)*0.4+(rnd(seed+t/9e7)*0.9-0.45);
  let ph=7.5+Math.sin(h/24*2*Math.PI+seed)*0.5+season*0.3+(rnd(seed+1+t/8e7)*0.4-0.2);
  return { do:+Math.max(0.5,dox).toFixed(1), ph:+Math.max(5,Math.min(10,ph)).toFixed(1), temp:+Math.max(2,temp).toFixed(1) }; }
const ARNG={ '1kun':[96,900000], 'hafta':[84,7200000], 'oy':[120,21600000],
  '6oy':[120,Math.round(180*86400000/120)], '1yil':[122,Math.round(365*86400000/122)],
  '2yil':[120,Math.round(730*86400000/120)], '3yil':[120,Math.round(1095*86400000/120)] };
const ARANGES=[['1kun','1 kun'],['hafta','Hafta'],['oy','Oy'],['6oy','6 oy'],['1yil','1 yil'],['2yil','2 yil'],['3yil','3 yil']];
let aRange='1kun', aData=null, aGeom=null, aIdx=null, aChip=null, aEnergyRange='oy';
function aHistory(dev,range){ const [n,step]=ARNG[range]; const now=Date.now(); const arr=[];
  for(let i=n-1;i>=0;i--){ const t=now-i*step; const v=simAt(dev.seed,t); arr.push({t,do:v.do,ph:v.ph,temp:v.temp}); }
  arr[arr.length-1]={t:now, do:(dev.do||simAt(dev.seed,now).do), ph:dev.ph, temp:dev.temp}; return arr; }
function aFmtX(t){ const d=new Date(t);
  if(aRange==='1kun') return p2(d.getHours())+':'+p2(d.getMinutes());
  if(['6oy','1yil','2yil','3yil'].includes(aRange)) return p2(d.getMonth()+1)+'/'+String(d.getFullYear()).slice(2);
  return p2(d.getDate())+'/'+p2(d.getMonth()+1); }
function aFmtFull(t){ const d=new Date(t); return d.getFullYear()+'/'+p2(d.getMonth()+1)+'/'+p2(d.getDate())+'  '+p2(d.getHours())+':'+p2(d.getMinutes()); }
function amono(){ return "'JetBrains Mono',monospace"; }
function setARange(r){ aRange=r; aIdx=null; document.querySelectorAll('#achart-ranges button').forEach(b=>b.classList.toggle('on',b.dataset.r===r));
  drawAChart((dbGet('devices')||[]).find(d=>d.chipId===aChip)); }
function drawAChart(dev){ const cv=document.getElementById('achart'); if(!cv||!dev) return;
  const data=aHistory(dev,aRange); aData=data;
  const dpr=window.devicePixelRatio||1, W=cv.clientWidth||600, H=300;
  cv.width=W*dpr; cv.height=H*dpr; const ctx=cv.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0); ctx.clearRect(0,0,W,H);
  const padL=8,padR=30,padT=14,padB=24, plotH=H-padT-padB, plotW=W-padL-padR;
  const X=i=>padL+i/(data.length-1)*plotW;
  const Y=(p,v)=>{ const P=APARAMS[p]; let r=(v-P.dmin)/(P.dmax-P.dmin); r=Math.max(0,Math.min(1,r)); return padT+(1-r)*plotH; };
  aGeom={X,Y,padL,padR,padT,padB,plotW,plotH,W,H};
  ctx.strokeStyle='#EAF0EE'; ctx.lineWidth=1; for(let g=0;g<=3;g++){ const y=padT+g/3*plotH; ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(W-padR,y); ctx.stroke(); }
  function line(p){ const P=APARAMS[p]; for(let i=0;i<data.length-1;i++){ const v1=data[i][p],v2=data[i+1][p];
    ctx.beginPath(); ctx.setLineDash(P.dash); ctx.lineWidth=p==='do'?2.2:1.6; ctx.strokeStyle=azone(p,aworse(p,v1,v2));
    ctx.moveTo(X(i),Y(p,v1)); ctx.lineTo(X(i+1),Y(p,v2)); ctx.stroke(); } ctx.setLineDash([]);
    const li=data.length-1; ctx.fillStyle='#5E736E'; ctx.font='700 10px '+amono(); ctx.fillText(P.label,X(li)+4,Y(p,data[li][p])+3); }
  ['temp','ph','do'].forEach(line);
  ctx.fillStyle='#92A29E'; ctx.font='10px '+amono();
  ctx.textAlign='left'; ctx.fillText(aFmtX(data[0].t),padL,H-6);
  ctx.textAlign='center'; ctx.fillText(aFmtX(data[(data.length/2)|0].t),padL+plotW/2,H-6);
  ctx.textAlign='right'; ctx.fillText(aFmtX(data[data.length-1].t),W-padR,H-6); ctx.textAlign='left';
  if(aIdx===null) aIdx=data.length-1; drawACursor(); }
function drawACursor(){ const cv=document.getElementById('achart'); if(!cv||!aData||!aGeom) return;
  const {X,Y,padT,plotH}=aGeom; const ctx=cv.getContext('2d'); const i=aIdx, d=aData[i];
  ctx.save(); ctx.strokeStyle='rgba(17,48,43,.4)'; ctx.setLineDash([4,4]); ctx.beginPath(); ctx.moveTo(X(i),padT-4); ctx.lineTo(X(i),padT+plotH+2); ctx.stroke(); ctx.setLineDash([]);
  ['do','ph','temp'].forEach(p=>{ const y=Y(p,d[p]); ctx.beginPath(); ctx.arc(X(i),y,4,0,7); ctx.fillStyle=azone(p,d[p]); ctx.fill(); ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke(); });
  ctx.restore();
  const ro=document.getElementById('areadout'); if(ro){ ro.innerHTML=`<span class="tm">${aFmtFull(d.t)}</span>`+
    `<span style="color:${azone('do',d.do)}">DO ${d.do.toFixed(1)}</span>`+
    `<span style="color:${azone('ph',d.ph)}">pH ${d.ph.toFixed(1)}</span>`+
    `<span style="color:${azone('temp',d.temp)}">T ${Math.round(d.temp)}°</span>`; } }
function bindAChart(){ const cv=document.getElementById('achart'); if(!cv) return;
  const move=cx=>{ if(!aGeom||!aData) return; const r=cv.getBoundingClientRect();
    let i=Math.round((cx-r.left-aGeom.padL)/aGeom.plotW*(aData.length-1)); i=Math.max(0,Math.min(aData.length-1,i)); if(i===aIdx) return; aIdx=i;
    drawAChart((dbGet('devices')||[]).find(d=>d.chipId===aChip)); };
  cv.ontouchstart=e=>move(e.touches[0].clientX); cv.ontouchmove=e=>{move(e.touches[0].clientX);e.preventDefault();};
  cv.onmousedown=e=>{move(e.clientX);cv._d=true;}; cv.onmousemove=e=>{if(cv._d)move(e.clientX);};
  window.addEventListener('mouseup',()=>{if(cv)cv._d=false;}); }
function aEnergy(dev,range){ const days={kun:1,hafta:7,oy:30,'3oy':90}[range]||1; const dailyH=4+rnd(dev.seed)*7;
  const soat=+(dailyH*days).toFixed(days===1?1:0); const kw=+((dev.aerSoni||1)*(dev.aerKw||2.2)).toFixed(1);
  const kwh=+(soat*kw).toFixed(days===1?1:0); const som=Math.round(kwh*(dev.tarif||600)).toLocaleString('ru-RU'); return {soat,kw,kwh,som}; }
function aEnergyHTML(dev){ const e=aEnergy(dev,aEnergyRange); const lbl={kun:'Bugun',hafta:'Bu hafta',oy:'Bu oy','3oy':'3 oyda'}[aEnergyRange];
  const pills=[['kun','Kun'],['hafta','Hafta'],['oy','Oy'],['3oy','3 oy']];
  return `<div class="panel" id="aenergy"><div class="panel-h"><h2>Elektr energiya sarfi</h2>
      <div class="ranges">${pills.map(([k,t])=>`<button class="${aEnergyRange===k?'on':''}" onclick="setAEnergyRange('${k}')">${t}</button>`).join('')}</div></div>
    <div class="panel-b" style="padding:18px">
      <div class="kvr"><span class="k">${lbl} ishlagani</span><span class="v">${e.soat} soat</span></div>
      <div class="kvr"><span class="k">Umumiy quvvat</span><span class="v">${e.kw} kW</span></div>
      <div class="kvr"><span class="k">Sarflangan energiya</span><span class="v big">${e.kwh} kWh</span></div>
      <div class="kvr"><span class="k">Taxminiy to'lov</span><span class="v big">${e.som} so'm</span></div>
    </div></div>`; }
function setAEnergyRange(r){ aEnergyRange=r; const el=document.getElementById('aenergy'); if(el) el.outerHTML=aEnergyHTML((dbGet('devices')||[]).find(d=>d.chipId===aChip)); }
function aBiomass(dev){ const cnt=dev.fish.count||1; const initKg=(dev.stockCount||cnt)*(dev.oWeight||25)/1000;
  const totalKg=initKg+(dev.feedGiven||0)/(dev.fcr||1.5); const avgG=Math.round(totalKg*1000/cnt);
  return {stock:dev.stockCount||cnt, cnt, oW:dev.oWeight||25, totalKg:+totalKg.toFixed(0), avgG, given:dev.feedGiven||0, stockDate:dev.stockDate}; }
let tt; function toast(m){ const e=document.getElementById('toast'); e.textContent=m; e.classList.add('show'); clearTimeout(tt); tt=setTimeout(()=>e.classList.remove('show'),2200); }

seed();
fbInit();
(function start(){
  document.getElementById('lg-pass').addEventListener('keydown',ev=>{ if(ev.key==='Enter') doLogin(); });
})();
</script>
